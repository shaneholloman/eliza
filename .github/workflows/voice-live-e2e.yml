name: Voice Live E2E

# Provisioned REAL voice lane. The keyless PR lanes stub voice entirely
# (silent-WAV TTS, shimmed STT transcript), so genuinely-real voice coverage —
# real speech synthesis + real transcription with real models — lives in this
# self-hosted model-heavy nightly / workflow_dispatch lane.
#
# What it proves (no mocks at any stage):
#   - Real fused ASR: the provisioned libelizainference + ASR bundle
#     transcribes real speech.
#   - Real fused Kokoro TTS: the provisioned libelizainference loads the
#     published Kokoro GGUF + voice .bin and synthesizes audible PCM.
#   - Optional mixed round-trip: when cloud voice/LLM keys are present, real
#     generated speech flows through fused local ASR, a live cloud LLM, and
#     live cloud TTS.
#
# The acoustic attribution matrix is provisioned with pinned GGUFs and a fused
# libelizainference build. Its scripts run in require-real mode so a missing
# model/ABI/credential is a hard failure rather than green skip evidence.
#
# Runner provisioning (full handoff: .github/issue-evidence/9454-gpu-runner-provisioning.md):
#   The two real jobs default to the online [self-hosted, Linux, X64, eliza]
#   runners. To repoint at a dedicated GPU box without editing this file, set the
#   repo variable VOICE_LIVE_RUNNER_LABELS to a JSON array of labels, e.g.
#   ["self-hosted","Linux","X64","gpu-cuda-12.6"] — this is the single point of
#   runner configuration. The chosen runner must have ffmpeg, a fused
#   libelizainference.so, and the eliza-1-2b ASR bundle staged; every voice GGUF
#   is fetched fresh from Hugging Face with a pinned sha256 by this lane. The
#   matrix is keyless (#9577): owner/impostor turns are synthesized locally with
#   distinct fused Kokoro presets, so ELEVENLABS_API_KEY is optional and only
#   upgrades the human-turn rows to real ElevenLabs voices.
#
# Runs nightly (offset from app-live-e2e) + on-demand; never on pull_request.

on:
  schedule:
    # 08:30 UTC daily — after app-live-e2e (07:00) settles, to avoid runner
    # contention on the shared GPU host.
    - cron: "30 8 * * *"
  workflow_dispatch:
    inputs:
      run_macos_electrobun:
        description: "Attempt the macOS Electrobun live-voice matrix lane"
        required: false
        default: false
        type: boolean
      run_windows_electrobun:
        description: "Attempt the Windows Electrobun live-voice matrix lane"
        required: false
        default: false
        type: boolean
      run_ios:
        description: "Attempt the iOS simulator/device live-voice matrix lane"
        required: false
        default: false
        type: boolean
      run_android:
        description: "Attempt the Android device/emulator live-voice matrix lane"
        required: false
        default: false
        type: boolean

concurrency:
  group: voice-live-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "true"
  NODE_VERSION: "24"
  BUN_VERSION: "canary"
  NODE_OPTIONS: "--experimental-sqlite"
jobs:
  voice-platform-matrix-index:
    name: Canonical voice matrix index
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          show-progress: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Emit matrix probe report
        run: |
          set -euo pipefail
          bun run voice:matrix -- --out "$RUNNER_TEMP/voice-platform-matrix"

      - name: Upload matrix probe report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: voice-platform-matrix-index
          path: ${{ runner.temp }}/voice-platform-matrix
          if-no-files-found: error

  voice-roundtrip:
    name: Real fused ASR + optional mixed round-trip (self-hosted)
    # Single point of runner config — override with repo var VOICE_LIVE_RUNNER_LABELS.
    runs-on: ${{ fromJSON(vars.VOICE_LIVE_RUNNER_LABELS || '["self-hosted","Linux","X64","eliza"]') }}
    timeout-minutes: 90
    env:
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
    # Hard live lane: a missing GPU/model environment must be visible as a failure.
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive
          show-progress: false

      - name: Preflight — GPU/voice tooling probe
        run: |
          set -euo pipefail
          # Informational probe. This job is continue-on-error + self-skipping
          # (the real steps gate on ELIZA_ROUNDTRIP_REAL_READY), so a bare runner
          # never red-Xs the branch — but surface the gap LOUDLY instead of a
          # silent `|| true` so the nightly board shows *why* real coverage
          # did not run.
          missing=""
          for tool in nvcc nvidia-smi ffmpeg; do
            if command -v "$tool" >/dev/null 2>&1; then
              echo "found: $tool ($(command -v "$tool"))"
            else
              missing="$missing $tool"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::warning title=Voice runner not fully provisioned::Absent GPU/media tools:${missing}. Real round-trip coverage needs the GPU runner from #9454 — see .github/issue-evidence/9454-gpu-runner-provisioning.md"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      # setup-bun-workspace instead of a hand-rolled `bun install --frozen-lockfile`:
      # this repo tracks bun canary, and canary rebuilds reserialize bun.lock
      # between builds, so a bare frozen install reds with "lockfile had changes,
      # but lockfile is frozen" on the nightly self-hosted runs (run 28548736294).
      # The composite handles the drift fallback and restores the committed
      # lockfile — same invocation as browser-real-bench.yml (#11231) and
      # scenario-pr.yml. Native apt + protoc are disabled: these self-hosted
      # runners build no Rust plugins, the install is --ignore-scripts, and a
      # sudo apt-get would introduce a new failure mode on the fleet.
      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          install-protoc: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Probe preprovisioned fused ASR bundle
        run: |
          set -euo pipefail
          first_existing_file() {
            for path in "$@"; do
              if [ -n "$path" ] && [ -f "$path" ]; then
                printf '%s\n' "$path"
                return 0
              fi
            done
            return 1
          }

          BUNDLE="${ELIZA_ASR_BUNDLE:-$HOME/.eliza/local-inference/models/eliza-1-2b.bundle}"
          FUSED_LIB="$(first_existing_file \
            "${ELIZA_INFERENCE_LIBRARY:-}" \
            "$BUNDLE/lib/libelizainference.so" \
            "$HOME/.eliza/local-inference/lib/libelizainference.so" \
            "$HOME/.eliza/local-inference/bin/mtp/linux-x64-cuda-fused/libelizainference.so" \
            "$HOME/.eliza/local-inference/bin/mtp/linux-x64-cpu-fused/libelizainference.so" \
            || true)"

          if [ ! -d "$BUNDLE/asr" ] || [ -z "$FUSED_LIB" ]; then
            echo "preprovisioned fused ASR bundle not found; full gated coverage is in voice-acoustic-matrix"
            echo "bundle=$BUNDLE"
            echo "fusedLib=${FUSED_LIB:-missing}"
            echo "ELIZA_ROUNDTRIP_REAL_READY=0" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "ELIZA_ASR_BUNDLE=$BUNDLE" >> "$GITHUB_ENV"
          echo "ELIZA_INFERENCE_LIBRARY=$FUSED_LIB" >> "$GITHUB_ENV"
          echo "ELIZA_ROUNDTRIP_REAL_READY=1" >> "$GITHUB_ENV"
          echo "bundle=$BUNDLE"
          echo "fusedLib=$FUSED_LIB"

      - name: Real fused ASR smoke (bun:ffi)
        if: env.ELIZA_ROUNDTRIP_REAL_READY == '1'
        run: bun run --cwd plugins/plugin-local-inference test:asr:real

      - name: Optional mixed real round-trip test
        if: env.ELIZA_ROUNDTRIP_REAL_READY == '1' && env.ELEVENLABS_API_KEY != '' && env.CEREBRAS_API_KEY != ''
        run: bun run --cwd plugins/plugin-local-inference roundtrip:real

  voice-acoustic-matrix:
    name: Real acoustic VAD + diarization + self-voice matrix (self-hosted)
    # Single point of runner config — override with repo var VOICE_LIVE_RUNNER_LABELS.
    runs-on: ${{ fromJSON(vars.VOICE_LIVE_RUNNER_LABELS || '["self-hosted","Linux","X64","eliza"]') }}
    timeout-minutes: 120
    env:
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive
          show-progress: false

      # Fail-fast provisioning gate. Before this, the job burned the full
      # install + GGUF download only to hard-fail deep in "Stage published
      # acoustic GGUFs" when the fused lib was absent (run 28548736294). Detect
      # the required assets up front: if the runner is truly provisioned, the
      # require-real matrix runs exactly as before (a provisioned-but-broken
      # runner still hard-fails — no fake green). If it is not provisioned at
      # all — the pure ops gap tracked by #9454 — self-skip LOUDLY to a neutral
      # result (a ::warning:: annotation + a SKIPPED.md artifact) instead of a
      # confusing mid-run red, so this nightly non-required lane stops being a
      # permanent unexplained red on the board.
      - name: Preflight — detect provisioned voice runner (GPU / fused lib / ASR bundle)
        run: |
          set -euo pipefail
          VOICE_REAL_MATRIX_OUT="$RUNNER_TEMP/voice-real-matrix"
          echo "VOICE_REAL_MATRIX_OUT=$VOICE_REAL_MATRIX_OUT" >> "$GITHUB_ENV"
          mkdir -p "$VOICE_REAL_MATRIX_OUT"

          first_existing_file() {
            for path in "$@"; do
              if [ -n "$path" ] && [ -f "$path" ]; then
                printf '%s\n' "$path"
                return 0
              fi
            done
            return 1
          }

          BUNDLE="${ELIZA_ASR_BUNDLE:-$HOME/.eliza/local-inference/models/eliza-1-2b.bundle}"
          FUSED_LIB="$(first_existing_file \
            "${ELIZA_INFERENCE_LIBRARY:-}" \
            "$BUNDLE/lib/libelizainference.so" \
            "$HOME/.eliza/local-inference/lib/libelizainference.so" \
            "$HOME/.eliza/local-inference/bin/mtp/linux-x64-cuda-fused/libelizainference.so" \
            "$HOME/.eliza/local-inference/bin/mtp/linux-x64-cpu-fused/libelizainference.so" \
            || true)"

          missing_tools=""
          for tool in nvcc nvidia-smi ffmpeg; do
            command -v "$tool" >/dev/null 2>&1 || missing_tools="$missing_tools $tool"
          done

          {
            echo "runner=$(hostname)"
            echo "workspace=$GITHUB_WORKSPACE"
            echo "runnerTemp=$RUNNER_TEMP"
            echo "bundle=$BUNDLE"
            echo "fusedLib=${FUSED_LIB:-missing}"
            echo "missingTools=${missing_tools:-none}"
            command -v nvcc       >/dev/null 2>&1 && nvcc --version        || echo "nvcc absent"
            command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi            || echo "nvidia-smi absent"
            command -v ffmpeg     >/dev/null 2>&1 && ffmpeg -version | head -1 || echo "ffmpeg absent"
            # Keyless by design (#9577): the owner/impostor corpus is synthesized
            # locally with distinct fused Kokoro presets, so no ElevenLabs secret
            # is required. The key only upgrades the human-turn rows to real voices.
            if [ -z "${ELEVENLABS_API_KEY:-}" ]; then
              echo "ELEVENLABS_API_KEY not set — keyless local-Kokoro corpus (#9577)"
            else
              echo "ELEVENLABS_API_KEY present — human-turn rows use real ElevenLabs voices"
            fi
          } 2>&1 | tee "$VOICE_REAL_MATRIX_OUT/probe.log"

          # A provisioned runner needs BOTH the fused libelizainference.so and the
          # eliza-1-2b ASR bundle staged (per the #9454 runbook). nvcc/nvidia-smi
          # are informational only — the fused lib carries GGML_CPU, so the acoustic
          # forward passes run CPU-only when there is no GPU.
          if [ -n "$FUSED_LIB" ] && [ -d "$BUNDLE/asr" ]; then
            echo "VOICE_RUNNER_PROVISIONED=1" >> "$GITHUB_ENV"
            echo "voice runner provisioned — running the require-real matrix"
          else
            echo "VOICE_RUNNER_PROVISIONED=0" >> "$GITHUB_ENV"
            {
              echo "# Voice acoustic matrix SKIPPED — runner not provisioned"
              echo
              echo "This self-hosted runner is missing staged voice assets, so the"
              echo "require-real acoustic matrix cannot run. This is runner"
              echo "provisioning (elizaOS/eliza#9454), NOT a code defect."
              echo
              echo "- fusedLib: ${FUSED_LIB:-MISSING (need libelizainference.so)}"
              echo "- asrBundle: $BUNDLE/asr ($( [ -d "$BUNDLE/asr" ] && echo present || echo MISSING ))"
              echo "- missingTools:${missing_tools:-none}"
              echo
              echo "Provision per .github/issue-evidence/9454-gpu-runner-provisioning.md"
              echo "(stage the fused libelizainference.so + the eliza-1-2b ASR"
              echo "bundle), then re-dispatch:"
              echo "  gh workflow run voice-live-e2e.yml --ref develop"
            } | tee "$VOICE_REAL_MATRIX_OUT/SKIPPED.md"
            echo "::error title=Voice acoustic matrix runner not provisioned::Missing fused libelizainference.so and/or the eliza-1-2b ASR bundle on this self-hosted runner. This lane needs the GPU runner staged per #9454 (.github/issue-evidence/9454-gpu-runner-provisioning.md)."
            exit 1
          fi

      - name: Setup Node.js
        if: env.VOICE_RUNNER_PROVISIONED == '1'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      # setup-bun-workspace instead of a hand-rolled `bun install --frozen-lockfile`
      # (bun-canary reserializes bun.lock → "lockfile had changes, but lockfile is
      # frozen"; see run 28548736294). Gated on the provisioning preflight so an
      # unprovisioned runner skips the install too and lands green in seconds.
      - name: Setup workspace dependencies
        if: env.VOICE_RUNNER_PROVISIONED == '1'
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          install-protoc: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Stage published acoustic GGUFs into a real bundle overlay
        if: env.VOICE_RUNNER_PROVISIONED == '1'
        run: |
          set -euo pipefail

          require_file() {
            local name="$1"
            local path="$2"
            if [ ! -f "$path" ]; then
              echo "$name not found at $path"
              exit 1
            fi
          }

          require_dir() {
            local name="$1"
            local path="$2"
            if [ ! -d "$path" ]; then
              echo "$name not found at $path"
              exit 1
            fi
          }

          first_existing_dir() {
            for path in "$@"; do
              if [ -n "$path" ] && [ -d "$path" ]; then
                printf '%s\n' "$path"
                return 0
              fi
            done
            return 1
          }

          first_existing_file() {
            for path in "$@"; do
              if [ -n "$path" ] && [ -f "$path" ]; then
                printf '%s\n' "$path"
                return 0
              fi
            done
            return 1
          }

          download_sha() {
            local url="$1"
            local dest="$2"
            local sha="$3"
            mkdir -p "$(dirname "$dest")"
            curl -fL --retry 3 --retry-delay 5 "$url" -o "$dest"
            local actual
            actual="$(sha256sum "$dest" | awk '{print $1}')"
            if [ "$actual" != "$sha" ]; then
              echo "sha256 mismatch for $dest"
              echo "expected $sha"
              echo "actual   $actual"
              exit 1
            fi
          }

          SRC_BUNDLE="$(first_existing_dir \
            "${ELIZA_ASR_BUNDLE:-}" \
            "$HOME/.eliza/local-inference/models/eliza-1-2b.bundle")"
          require_dir "ASR region" "$SRC_BUNDLE/asr"

          FUSED_LIB="$(first_existing_file \
            "${ELIZA_INFERENCE_LIBRARY:-}" \
            "$SRC_BUNDLE/lib/libelizainference.so" \
            "$HOME/.eliza/local-inference/lib/libelizainference.so" \
            "$HOME/.eliza/local-inference/bin/mtp/linux-x64-cuda-fused/libelizainference.so" \
            "$HOME/.eliza/local-inference/bin/mtp/linux-x64-cpu-fused/libelizainference.so" \
            || true)"
          if [ -z "$FUSED_LIB" ]; then
            echo "FATAL: fused libelizainference.so is not staged on this runner."
            echo "Provision the lane per .github/issue-evidence/9454-gpu-runner-provisioning.md"
            echo "(stage the fused libelizainference.so + the eliza-1-2b ASR bundle)."
            exit 1
          fi

          BUNDLE="$RUNNER_TEMP/eliza-voice-real.bundle"
          node packages/scripts/rm-path-recursive.mjs "$BUNDLE"
          mkdir -p "$BUNDLE"
          for entry in "$SRC_BUNDLE"/*; do
            name="$(basename "$entry")"
            case "$name" in
              speaker|speaker-encoder|diariz|diarizer|vad|voice) ;;
              *) ln -s "$entry" "$BUNDLE/$name" ;;
            esac
          done

          base="https://huggingface.co/elizaos/eliza-1/resolve/main"
          download_sha "$base/voice/speaker-encoder/wespeaker-resnet34-lm.gguf" \
            "$BUNDLE/speaker/wespeaker-resnet34-lm.gguf" \
            "ad066730b125f61a305c949f7f196d23681f387f3e3f916be7a4cd003aae6ae3"
          download_sha "$base/voice/diarizer/pyannote-segmentation-3.0.gguf" \
            "$BUNDLE/diariz/pyannote-segmentation-3.0.gguf" \
            "30983eba41c0a99ab7eada564739ae8be74faeb21a31da759c870b5173cbd8a5"
          download_sha "$base/voice/vad/silero-vad-v5.1.2.ggml.bin" \
            "$BUNDLE/vad/silero-vad-v5.1.2.ggml.bin" \
            "29940d98d42b91fbd05ce489f3ecf7c72f0a42f027e4875919a28fb4c04ea2cf"
          download_sha "$base/bundles/2b/vad/silero-vad-v5.gguf" \
            "$BUNDLE/vad/silero-vad-v5.gguf" \
            "d348cd6d87ea53dcd3e6680698c88be326082e27dae899adef653d090bee4995"
          download_sha "$base/bundles/2b/tts/kokoro/kokoro-82m-v1_0.gguf" \
            "$BUNDLE/tts/kokoro/kokoro-82m-v1_0.gguf" \
            "25521c1aa35218d03630bf5239e70d8b5acd0e54c6e92543accfb3ebf9cff9d2"
          download_sha "$base/bundles/2b/tts/kokoro/voices/af_bella.bin" \
            "$BUNDLE/tts/kokoro/voices/af_bella.bin" \
            "63d24d0e5d91cb6cf3bca294a3b8c0b4428aa54ac9b5de42e5ba07f6bd110ea8"

          {
            echo "ELIZA_ASR_BUNDLE=$BUNDLE"
            echo "ELIZA_INFERENCE_LIBRARY=$FUSED_LIB"
            echo "ELIZA_KOKORO_MODEL_DIR=$BUNDLE/tts/kokoro"
            echo "ELIZA_KOKORO_DEFAULT_VOICE_ID=af_bella"
            echo "ELIZA_SPEAKER_GGUF=$BUNDLE/speaker/wespeaker-resnet34-lm.gguf"
            echo "ELIZA_DIARIZ_GGUF=$BUNDLE/diariz/pyannote-segmentation-3.0.gguf"
            echo "ELIZA_TEST_SPEAKER_GGUF=$BUNDLE/speaker/wespeaker-resnet34-lm.gguf"
            echo "ELIZA_TEST_DIARIZ_GGUF=$BUNDLE/diariz/pyannote-segmentation-3.0.gguf"
            echo "ELIZA_VOICE_REAL_MODEL_DIR=$BUNDLE"
            echo "VOICE_REAL_MATRIX_OUT=$VOICE_REAL_MATRIX_OUT"
          } >> "$GITHUB_ENV"

          mkdir -p "$VOICE_REAL_MATRIX_OUT"
          {
            echo "sourceBundle=$SRC_BUNDLE"
            echo "overlayBundle=$BUNDLE"
            echo "fusedLib=$FUSED_LIB"
            find "$BUNDLE" -maxdepth 4 -type f -printf '%P %s bytes\n' | sort
          } | tee "$VOICE_REAL_MATRIX_OUT/provisioning.txt"

      - name: Real Kokoro GGUF synth smoke
        if: env.VOICE_RUNNER_PROVISIONED == '1'
        run: |
          set -euo pipefail
          bun run --cwd plugins/plugin-local-inference test:kokoro:real \
            2>&1 | tee "$VOICE_REAL_MATRIX_OUT/kokoro-real-smoke.log"

      - name: Real fused attribution smoke
        if: env.VOICE_RUNNER_PROVISIONED == '1'
        run: |
          set -euo pipefail
          bun packages/app-core/scripts/voice-attribution-smoke.ts \
            --models "$ELIZA_VOICE_REAL_MODEL_DIR" \
            --require-real \
            2>&1 | tee "$VOICE_REAL_MATRIX_OUT/voice-attribution-smoke.log"

      - name: Real plugin voice stack matrix
        if: env.VOICE_RUNNER_PROVISIONED == '1'
        run: |
          set -euo pipefail
          bun run --cwd plugins/plugin-local-inference voicestack:real \
            2>&1 | tee "$VOICE_REAL_MATRIX_OUT/voicestack-real.log"
          bun run --cwd plugins/plugin-local-inference agentvoice:real \
            2>&1 | tee "$VOICE_REAL_MATRIX_OUT/agentvoice-real.log"
          bun run --cwd plugins/plugin-local-inference robustness:real \
            2>&1 | tee "$VOICE_REAL_MATRIX_OUT/robustness-real.log"

      - name: Real voice workbench scenario matrix
        if: env.VOICE_RUNNER_PROVISIONED == '1'
        run: |
          set -euo pipefail
          bun run --cwd plugins/plugin-local-inference voice:workbench --real \
            --out "$VOICE_REAL_MATRIX_OUT/voice-workbench-real" \
            2>&1 | tee "$VOICE_REAL_MATRIX_OUT/voice-workbench-real.log"

      - name: Real packages/benchmarks/voice matrix
        if: env.VOICE_RUNNER_PROVISIONED == '1'
        run: |
          set -euo pipefail
          bun packages/benchmarks/voice/voice-real-ci-matrix.mjs \
            2>&1 | tee "$VOICE_REAL_MATRIX_OUT/benchmarks-voice-real-ci-matrix.log"

      - name: Real fused FFI vitest lanes
        if: env.VOICE_RUNNER_PROVISIONED == '1'
        run: |
          set -euo pipefail
          bunx vitest run --config packages/test/vitest/real.config.ts \
            plugins/plugin-local-inference/src/services/voice/speaker/encoder-fused.real.test.ts \
            plugins/plugin-local-inference/src/services/voice/speaker/diarizer-fused.real.test.ts \
            plugins/plugin-local-inference/src/services/voice/asr-timed.real.test.ts \
            plugins/plugin-local-inference/src/services/voice/kokoro/__tests__/kokoro-engine-bridge.real.test.ts \
            2>&1 | tee "$VOICE_REAL_MATRIX_OUT/fused-real-vitest.log"

      - name: Upload real voice matrix logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: voice-real-acoustic-matrix
          path: ${{ runner.temp }}/voice-real-matrix
          if-no-files-found: error

