name: Windows Dev Smoke

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  schedule:
    # Weekly Windows smoke check (Mondays 06:00 UTC).
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: windows-dev-smoke-${{ github.ref }}
  cancel-in-progress: true

# Default to least privilege. Override per-job where needed.
permissions:
  contents: read

jobs:
  changes:
    name: Classify changed paths
    runs-on: [self-hosted, hetzner-robot]
    outputs:
      windows_dev: ${{ steps.filter.outputs.windows_dev }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          submodules: false

      - name: Determine affected Windows dev smoke surface
        id: filter
        shell: bash
        env:
          PR_LABELS: ${{ github.event_name == 'pull_request' && join(github.event.pull_request.labels.*.name, ',') || '' }}
        run: |
          set -euo pipefail
          node packages/scripts/ci-path-gate.mjs \
            --config windows-dev \
            --event "${{ github.event_name }}" \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --labels "$PR_LABELS" \
            --output "$GITHUB_OUTPUT" \
            --summary "$GITHUB_STEP_SUMMARY"

  dev-smoke:
    name: Windows smoke (${{ matrix.bun-version }})
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.windows_dev == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # Exercise the same Bun line that can parse the current lockfile, so
        # Windows smoke covers repo behavior instead of failing during install.
        bun-version: ["canary"]

    steps:
      - name: Enable long paths (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          function Set-GitLongPaths([string]$Scope) {
            & git config $Scope core.longpaths true
            if ($LASTEXITCODE -ne 0) {
              throw "git config $Scope core.longpaths true failed with exit code $LASTEXITCODE"
            }
          }

          try {
            Set-GitLongPaths "--system"
            Write-Host "Enabled Git long paths in system config."
          } catch {
            Write-Warning "System git config failed; falling back to --global. $($_.Exception.Message)"
            Set-GitLongPaths "--global"
            Write-Host "Enabled Git long paths in global config."
          }

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          sparse-checkout: |
            /package.json
            /bun.lock
            /bunfig.toml
            /tsconfig.json
            /.github/actions/setup-bun-workspace/**
            packages/
            patches/
            scripts/
            plugins/
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Setup Bun workspace
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ matrix.bun-version }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          run-postinstall: "false"
          init-submodules: "false"

      - name: Verify json5 interop
        run: >
          bun -e "import * as JSON5Module from 'json5';
          const JSON5 = JSON5Module.default ?? JSON5Module;
          if (typeof JSON5.parse !== 'function') throw new Error('JSON5.parse missing');
          console.log('json5 interop ok');"

      - name: Verify bun-version-guard
        run: >
          bun -e "import { getBunVersionAdvisory } from './packages/app-core/scripts/lib/bun-version-guard.mjs';
          const result = getBunVersionAdvisory();
          console.log('bun-version-guard:', result ?? 'OK (no advisory)');"
