name: Monetized + Showcase Loop Nightly

# Two scheduled jobs guard the cloud monetization system end to end:
#
#   1. `showcase-mock` (#9300) - ACTIVE green coverage, no secrets. Boots the same
#      in-process mock stack as cloud-e2e.yml and drives the example apps showcase
#      loop (EDAD + Clone Ur Crush: deploy -> app subdomain -> monetize ->
#      charge -> creator earning -> redeemable) plus the monetized full loop.
#      This is the scheduled regression net that fails the moment app-registration
#      / container-deploy / usage / billing / monetization drift - even when no PR
#      touches the cloud paths (e.g. a dependency bump). Always runs; never skips.
#
#   2. `loop` - Real-Hetzner parity SCAFFOLD for the monetized full loop + the
#      example-apps showcase (#8935 / #9300). The per-PR mock-stack variant runs
#      via cloud-e2e.yml (it globs every packages/test/cloud-e2e/tests/*.spec.ts).
#      This job is the live-infra counterpart: it sets MONETIZED_LOOP_REAL=1, under
#      which both specs currently SKIP at the describe level (so no mock stack is
#      booted and no mock assertion is ever passed off as real). Wiring the live
#      driver - one that drives MONETIZED_LOOP_BASE_URL with a real showcase key
#      instead of the mock `stack` fixture and lets provision/deploy stand up an
#      actual Hetzner node - is a tracked #8935/#9300 follow-up. The job is landed
#      now so it activates the moment that driver + secrets exist; until then a
#      real run reports green-but-skipped.
#
# Honest-skip (job 2): when the required secrets are absent the job exits 0 with a
# warning (so the workflow can land on develop and be activated later); a manual
# workflow_dispatch with missing secrets fails loudly.
#
# Required secrets / config (GitHub environment: ci-hetzner-e2e):
#   HCLOUD_TOKEN_CI        - Hetzner Cloud API token (CI-scoped project)
#   CLOUD_E2E_API_KEY      - Eliza Cloud staging showcase bearer token (long-lived).
#                            The showcase account is documented in
#                            packages/test/cloud-e2e/docs/showcase-apps-coverage.md.
#
# Optional:
#   MONETIZED_LOOP_BASE_URL - staging cloud-api base URL the loop drives.
#                             Defaults to https://api-staging.elizacloud.ai.

on:
  schedule:
    - cron: '30 7 * * *'  # 07:30 UTC nightly (offset from hetzner-e2.yml's 07:00)
  workflow_dispatch:
    inputs:
      base_url:
        description: Staging cloud-api base URL (overrides MONETIZED_LOOP_BASE_URL)
        required: false
        type: string

concurrency:
  group: monetized-loop-nightly
  cancel-in-progress: false

# Default to least privilege.
permissions:
  contents: read

jobs:
  loop:
    name: Monetized full loop (real Hetzner)
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    environment: ci-hetzner-e2e
    timeout-minutes: 40
    env:
      NODE_ENV: test
      NODE_OPTIONS: --max-old-space-size=4096
      # Real-infra credentials (absent → honest-skip below).
      HCLOUD_TOKEN_CI: ${{ secrets.HCLOUD_TOKEN_CI }}
      CLOUD_E2E_API_KEY: ${{ secrets.CLOUD_E2E_API_KEY || secrets.ELIZACLOUD_API_KEY }}
      # The real-Hetzner loop never boots the mock stack: tell the loop runner to
      # drive the live staging API directly.
      MONETIZED_LOOP_REAL: "1"
      MONETIZED_LOOP_BASE_URL: ${{ inputs.base_url || vars.MONETIZED_LOOP_BASE_URL || 'https://api-staging.elizacloud.ai' }}
    steps:
      - name: Check secret configuration
        id: secret_config
        run: |
          missing=()
          [ -z "$HCLOUD_TOKEN_CI" ] && missing+=("HCLOUD_TOKEN_CI")
          [ -z "$CLOUD_E2E_API_KEY" ] && missing+=("CLOUD_E2E_API_KEY")
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing secrets: ${missing[*]}; skipping monetized-loop nightly."
            {
              echo "### Monetized loop nightly skipped"
              echo ""
              echo "Missing secrets in GitHub environment \`ci-hetzner-e2e\`:"
              for s in "${missing[@]}"; do echo "- \`$s\`"; done
              echo ""
              echo "The per-PR mock-stack variant still runs in \`cloud-e2e.yml\`."
            } >> "$GITHUB_STEP_SUMMARY"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "::error::Manual dispatch requires HCLOUD_TOKEN_CI + CLOUD_E2E_API_KEY."
              exit 1
            fi
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.secret_config.outputs.configured == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1

      - name: Setup test env (bun + workspace)
        if: steps.secret_config.outputs.configured == 'true'
        uses: ./.github/actions/cloud-setup-test-env

      - name: Install Playwright browsers (chromium only)
        if: steps.secret_config.outputs.configured == 'true'
        run: bunx playwright install --with-deps chromium

      - name: Cloud API auth preflight
        id: cloud_auth
        if: steps.secret_config.outputs.configured == 'true'
        run: |
          set +e
          status_code="$(
            bun -e '
              const base = (process.env.MONETIZED_LOOP_BASE_URL ?? "").replace(/\/+$/, "");
              const res = await fetch(`${base}/api/v1/eliza/agents`, {
                headers: {
                  authorization: `Bearer ${process.env.CLOUD_E2E_API_KEY ?? ""}`,
                  accept: "application/json",
                  "user-agent": "monetized-loop-nightly-preflight/1.0",
                },
                signal: AbortSignal.timeout(30_000),
              });
              console.log(res.status);
            '
          )"
          rc=$?
          set -e
          if [ "$status_code" = "401" ] || [ "$status_code" = "403" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::error::Cloud API rejected CLOUD_E2E_API_KEY with HTTP $status_code; refresh the ci-hetzner-e2e environment secret."
            {
              echo "### Monetized loop nightly blocked by rejected Cloud API credential"
              echo ""
              echo "Cloud API rejected \`CLOUD_E2E_API_KEY\` with HTTP \`$status_code\` before the real-Hetzner monetized loop."
              echo ""
              echo "Refresh \`CLOUD_E2E_API_KEY\` / \`ELIZACLOUD_API_KEY\` in the \`ci-hetzner-e2e\` environment, or check the staging API-key lookup path."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if [ "$rc" -ne 0 ] || [ -z "$status_code" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloud API auth preflight failed (rc=$rc status=$status_code); skipping monetized-loop nightly."
            {
              echo "### Monetized loop nightly skipped"
              echo ""
              echo "Cloud API auth preflight against \`$MONETIZED_LOOP_BASE_URL\` failed (rc=\`$rc\`, status=\`$status_code\`)."
              echo ""
              echo "Refresh \`CLOUD_E2E_API_KEY\` in the \`ci-hetzner-e2e\` environment or check staging availability."
            } >> "$GITHUB_STEP_SUMMARY"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              exit 1
            fi
            exit 0
          fi

          if [ "${status_code#5}" != "$status_code" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloud API auth preflight returned HTTP $status_code; skipping monetized-loop nightly before provisioning."
            {
              echo "### Monetized loop nightly skipped"
              echo ""
              echo "Cloud API auth preflight against \`$MONETIZED_LOOP_BASE_URL\` returned HTTP \`$status_code\` before provisioning Hetzner capacity."
              echo ""
              echo "Check staging Cloud API availability before re-running."
            } >> "$GITHUB_STEP_SUMMARY"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              exit 1
            fi
            exit 0
          fi

          if [ "${status_code#2}" != "$status_code" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Unexpected Cloud API auth preflight response: status=$status_code"
          exit 1

      - name: Run monetized full loop + example-apps showcase (real Hetzner)
        if: steps.secret_config.outputs.configured == 'true' && steps.cloud_auth.outputs.ready == 'true'
        # Cap the run step below the 40m job budget. The real-staging deploy
        # specs (example-edad / example-clone-ur-crush) drive a live Hetzner
        # deploy that can stall; without a step cap the whole job hits the
        # job-level 40m limit and reports an opaque "operation was canceled"
        # with no report uploaded. A step timeout fails loudly ("step timed
        # out") and leaves headroom for the always() artifact-upload steps.
        timeout-minutes: 25
        run: bun run cloud:e2e -- monetized-full-loop.spec.ts example-apps-showcase.spec.ts example-edad-real-deploy.spec.ts example-clone-ur-crush-real-deploy.spec.ts
        env:
          CI: "true"
          E2E_RECORD: "1"
          # Drive the live staging API + real Hetzner; do NOT enable the mock
          # registrar/Hetzner flags (no MOCK_* / ELIZA_CF_REGISTRAR_DEV_STUB).
          MONETIZED_LOOP_REAL: "1"
          E2E_FRONTEND_URL: ${{ env.MONETIZED_LOOP_BASE_URL }}

      - name: Upload Playwright report + video
        if: always() && steps.secret_config.outputs.configured == 'true' && steps.cloud_auth.outputs.ready == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: monetized-loop-nightly-report-${{ github.run_attempt }}
          path: |
            packages/test/cloud-e2e/playwright-report
            packages/test/cloud-e2e/test-results
            e2e-recordings/cloud-e2e
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload process logs (boot diagnostics)
        if: always() && steps.secret_config.outputs.configured == 'true' && steps.cloud_auth.outputs.ready == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: monetized-loop-nightly-logs-${{ github.run_attempt }}
          path: |
            packages/test/cloud-e2e/.logs
          retention-days: 14
          include-hidden-files: true
          if-no-files-found: ignore

  # ACTIVE scheduled coverage (#9300): mock-stack example-apps showcase.
  # No secrets, never skips. Drives EDAD + Clone Ur Crush end to end (deploy -> app
  # subdomain -> monetize -> charge -> creator earning -> redeemable) plus the
  # monetized full loop against the in-process mock stack, on the nightly schedule.
  # This is the always-green regression net the real-Hetzner job (above) cannot be
  # until its live driver + secrets land. Mirrors cloud-e2e.yml's mock setup.
  showcase-mock:
    name: Example-apps showcase loop (mock stack)
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 30
    env:
      NODE_ENV: test
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1

      - uses: ./.github/actions/cloud-setup-test-env

      - name: Install Playwright browsers (chromium only)
        run: bunx playwright install --with-deps chromium

      - name: Build cloud-shared (drizzle artifacts)
        # cloud-e2e fixture re-runs migrations against PGlite so build is best-effort.
        run: bun run --cwd packages/cloud/shared build || true

      - name: Run example-apps showcase + monetized full loop (mock stack)
        # monetized-mock-llm-journey drives the real POST /api/v1/messages +
        # x-app-id billing seam through an in-process OpenAI mock (keyless), the
        # always-on counterpart to the CEREBRAS-gated real-LLM journey — included
        # here so the scheduled regression net also guards the messages route.
        run: bun run cloud:e2e -- example-apps-showcase.spec.ts monetized-full-loop.spec.ts monetized-mock-llm-journey.spec.ts
        env:
          CI: "true"
          CLOUD_E2E: "1"
          E2E_RECORD: "1"
          # mocks read these
          MOCK_REDIS: "1"
          MOCK_HETZNER_LATENCY: "0"
          MOCK_HETZNER_ACTION_MS: "30"
          CONTROL_PLANE_TICK_MS: "50"
          # placeholder values so client code doesn't crash on lookup; no real creds
          DATABASE_URL: "pglite://./.eliza-ci/.pgdata"
          HCLOUD_TOKEN: "test-token"
          CONTAINER_CONTROL_PLANE_TOKEN: "test-token"
          CRON_SECRET: "test-cron-secret"

      - name: Upload Playwright report + video
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: showcase-mock-report-${{ github.run_attempt }}
          path: |
            packages/test/cloud-e2e/playwright-report
            packages/test/cloud-e2e/test-results
            e2e-recordings/cloud-e2e
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload process logs (boot diagnostics)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: showcase-mock-logs-${{ github.run_attempt }}
          path: |
            packages/test/cloud-e2e/.logs
          retention-days: 14
          include-hidden-files: true
          if-no-files-found: ignore
