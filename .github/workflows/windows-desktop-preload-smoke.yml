name: Windows Desktop Preload Smoke

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  workflow_dispatch:

concurrency:
  group: windows-desktop-preload-smoke-${{ github.ref }}
  cancel-in-progress: true

# Default to least privilege. Override per-job where needed.
permissions:
  contents: read

jobs:
  changes:
    name: Classify changed paths
    # Path classifier is a git-diff + node script: no self-hosted resources.
    # Keep it on GitHub-hosted so a drained hetzner fleet cannot leave it
    # queued indefinitely and pile up runs (#13617/#8501).
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      desktop_preload: ${{ steps.filter.outputs.desktop_preload }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node.js for path gate
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Determine affected desktop preload surface
        id: filter
        shell: bash
        env:
          PR_LABELS: ${{ github.event_name == 'pull_request' && join(github.event.pull_request.labels.*.name, ',') || '' }}
        run: |
          set -euo pipefail
          node packages/scripts/ci-path-gate.mjs \
            --config desktop-preload \
            --event "${{ github.event_name }}" \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --labels "$PR_LABELS" \
            --output "$GITHUB_OUTPUT" \
            --summary "$GITHUB_STEP_SUMMARY"

  preload-smoke:
    name: desktop preload preflight (windows)
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.desktop_preload == 'true'
    runs-on: windows-latest
    steps:
      - name: Enable long paths (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          function Set-GitLongPaths([string]$Scope) {
            & git config $Scope core.longpaths true
            if ($LASTEXITCODE -ne 0) {
              throw "git config $Scope core.longpaths true failed with exit code $LASTEXITCODE"
            }
          }

          try {
            Set-GitLongPaths "--system"
            Write-Host "Enabled Git long paths in system config."
          } catch {
            Write-Warning "System git config failed; falling back to --global. $($_.Exception.Message)"
            Set-GitLongPaths "--global"
            Write-Host "Enabled Git long paths in global config."
          }

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          sparse-checkout: |
            /package.json
            /bun.lock
            /bunfig.toml
            /tsconfig.json
            /.github/actions/setup-bun-workspace/**
            /.github/actions/turbo-cache-github/**
            packages/
            patches/
            scripts/
            plugins/
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Setup Bun workspace
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: "1.3.14" # pinned: floating canary writes lockfileVersion 2 and breaks --frozen-lockfile (#11184/#9454); packageManager bun@1.4.0-canary.1 is unresolvable (GH+npm 404)
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          run-postinstall: "false"
          init-submodules: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Run lightweight desktop bootstrap patches
        run: |
          bun install --cwd packages/app-core/platforms/electrobun --ignore-scripts
          node packages/app-core/scripts/patch-workspace-plugins.mjs
          node packages/app-core/scripts/patch-deps.mjs
          node packages/app-core/scripts/ensure-type-package-aliases.mjs

      - name: Desktop preflight
        run: bun packages/app-core/scripts/desktop-build.mjs preflight --variant=base

      - name: Build preload bridge
        working-directory: packages/app-core/platforms/electrobun
        # Invoke node directly because the package.json script is literally
        # this command, and keeping the smoke minimal makes Windows failures
        # easier to attribute to preload generation.
        run: node ../../scripts/build-electrobun-preload.mjs
