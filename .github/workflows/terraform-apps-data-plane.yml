name: Terraform — Apps Data Plane (Hetzner)

# Plan/apply the PER-ENV half of the Eliza Cloud Apps (Product 2) data-plane IaC
# (packages/cloud/infra/cloud/terraform/hetzner/apps-data-plane) — i.e. the
# app worker node(s) + their wildcard Cloudflare record.
#
# The SHARED resources (private network + tenant Postgres) live in
# packages/cloud/infra/cloud/terraform/hetzner/apps-shared and are managed by
# the terraform-apps-shared.yml workflow. This module reads their outputs via
# a `terraform_remote_state` data source — so the R2 state creds below are
# needed for BOTH this module's state AND for the shared remote-state read.
#
#   pull_request touching the module -> fmt + validate (NO cloud creds, no state — safe)
#   workflow_dispatch (manual)        -> terraform plan or apply against an
#                                        environment (staging | production)
#
# Apply provisions real billed Hetzner servers (the app worker node(s)), so
# it is an explicit operator action — it never auto-runs. "develop = staging"
# is expressed by choosing environment=staging on dispatch.
#
# Topology:
#   Apps Product 2 (untrusted user containers + per-user tenant DB) lives in
#   a DEDICATED Hetzner project (`apps`) — separate from the agent control-
#   plane projects (`eliza-staging`, `eliza-prod`). One Hetzner project
#   holds both staging and production Apps resources; the per-env scoping
#   stays in the Terraform state file key + resource names (eliza-apps-node-
#   ${env}-N, eliza-apps-tenantdb-${env}). This is intentional: Apps Product
#   2 is alpha — operator overhead of two more projects (apps-staging +
#   apps-prod) isn't worth it until there's real prod traffic to isolate.
#
# Secrets:
#   repo-level (NOT env-scoped — apps project is shared across envs):
#     HCLOUD_APPS_TOKEN             Hetzner Cloud API token for the `apps`
#                                   project. Both staging + production
#                                   applies authenticate with the same value.
#     CLOUDFLARE_API_TOKEN          Cloudflare DNS token (wildcard apps record)
#     R2_STATE_ACCESS_KEY_ID        R2 token -> AWS_ACCESS_KEY_ID (tf state backend)
#     R2_STATE_SECRET_ACCESS_KEY    R2 token -> AWS_SECRET_ACCESS_KEY (tf state backend)
# Variables (environment-scoped — set per env, no defaults shipped in the module):
#   APPS_CLOUDFLARE_ZONE_ID         Cloudflare zone id for the apps base domain
#   APPS_OPERATOR_SSH_KEY           operator SSH public key allowed onto the nodes
#   APPS_BASE_DOMAIN                e.g. apps.elizacloud.ai (prod) /
#                                        apps-staging.elizacloud.ai (staging)
#   OPERATOR_INGRESS_CIDRS          JSON array of allowed SSH CIDRs, e.g.
#                                        ["1.2.3.4/32"] — `0.0.0.0/0` rejected
#                                        by the module's `validation` block.

on:
  pull_request:
    paths:
      - "packages/cloud/infra/cloud/terraform/hetzner/apps-data-plane/**"
      - ".github/workflows/terraform-apps-data-plane.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to target
        type: choice
        default: staging
        options: [staging, production]
      action:
        description: terraform action
        type: choice
        default: plan
        options: [plan, apply]
      replace:
        description: |
          Optional. Comma-separated TF resource addresses to force-replace on
          this apply (e.g. "hcloud_server.tenant_db"). Threaded through as
          `-replace=<addr>` flags. Leave empty for a normal apply. Has no
          effect on `plan` action.
        type: string
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: write

# Serialize plan/apply across BOTH this workflow and terraform-apps-shared.yml
# — they share the apps Hetzner project AND apps-data-plane reads the shared
# state via `terraform_remote_state`. A shared-state rebuild of hcloud_network
# would otherwise race a concurrent per-env app_node attach. PR validation
# stays parallel via the format() fallback.
concurrency:
  # PR group is workflow-scoped (data-plane) so it never collides with the
  # sibling apps-shared workflow — concurrency groups are repo-wide, and a PR
  # touching both modules must not have one workflow cancel the other's
  # fmt/validate. workflow_dispatch keeps the shared 'terraform-apps-hetzner'
  # group so an apply on either half still serializes against the other.
  group: ${{ github.event_name == 'workflow_dispatch' && 'terraform-apps-hetzner' || format('terraform-apps-data-plane-pr-{0}', github.ref) }}
  # #14051 Tier B: PR runs are fmt+validate only (no creds, no state) — safe to
  # cancel a superseded PR run on the next push. workflow_dispatch (plan/apply
  # against real state) uses the separate 'terraform-apps-hetzner' group and is
  # NEVER cancelled, so an in-flight apply cannot be interrupted.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TF_DIR: packages/cloud/infra/cloud/terraform/hetzner/apps-data-plane
  # 1.10.5 — needed for S3 backend `use_lockfile = true` (R2 has no DynamoDB
  # equivalent, this is how we serialize state writes). Bumping below 1.10
  # silently reintroduces the parallel-apply race.
  TF_VERSION: "1.10.5"

jobs:
  # PR validation: format + validate only. No cloud credentials, no remote state,
  # so it runs safely on every PR (incl. before the env HCLOUD_TOKEN exists).
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: terraform fmt -check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive
      - name: terraform validate (no backend)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -backend=false -input=false
          terraform validate -no-color

  # Manual plan/apply against a real environment. The `environment:` binding
  # gates the run on the GH environment's required-reviewer rule (if set), but
  # the Hetzner credential is the repo-level HCLOUD_APPS_TOKEN — Apps Product
  # 2 lives in a dedicated shared Hetzner project, not the per-env eliza-prod
  # / eliza-staging projects (see header comment).
  plan-apply:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    environment: ${{ github.event.inputs.environment }}
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_APPS_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # R2 (S3-compatible) state backend creds.
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_STATE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_STATE_SECRET_ACCESS_KEY }}
      # Non-secret inputs threaded as TF_VAR_*. The zone id is accepted as either
      # a secret OR a var (operators have set it both ways) — secret wins if present.
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.APPS_CLOUDFLARE_ZONE_ID || vars.APPS_CLOUDFLARE_ZONE_ID }}
      TF_VAR_ssh_public_keys: '["${{ vars.APPS_OPERATOR_SSH_KEY }}"]'
      # apps_base_domain must be distinct per env (Cloudflare DNS wildcard
      # records collide otherwise — staging would overwrite prod's record on
      # the next apply). Module validation also rejects identical defaults.
      TF_VAR_apps_base_domain: ${{ vars.APPS_BASE_DOMAIN }}
      # operator_ingress_cidrs MUST be a JSON array literal; module validation
      # rejects 0.0.0.0/0. Set as a GH env var, e.g. '["1.2.3.4/32"]'.
      TF_VAR_operator_ingress_cidrs: ${{ vars.OPERATOR_INGRESS_CIDRS }}
      # cloud-api origin for THIS env — Caddy's on-demand-TLS ask endpoint lives
      # under it. Must be env-correct (staging api vs prod api) or cert issuance
      # checks the wrong environment's state.
      TF_VAR_cloud_api_origin: ${{ vars.APPS_CLOUD_API_ORIGIN }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Preflight — required secrets / vars present
        run: |
          env="${{ github.event.inputs.environment }}"
          fail=0
          [ -n "$HCLOUD_TOKEN" ] || { echo "::error::set repo secret HCLOUD_APPS_TOKEN (apps Hetzner project token, shared across envs)"; fail=1; }
          [ -n "$AWS_ACCESS_KEY_ID" ] || { echo "::error::missing repo secret R2_STATE_ACCESS_KEY_ID"; fail=1; }
          [ -n "$AWS_SECRET_ACCESS_KEY" ] || { echo "::error::missing repo secret R2_STATE_SECRET_ACCESS_KEY"; fail=1; }
          [ -n "$CLOUDFLARE_API_TOKEN" ] || { echo "::error::missing repo secret CLOUDFLARE_API_TOKEN"; fail=1; }
          [ -n "$TF_VAR_cloudflare_zone_id" ] || { echo "::error::set APPS_CLOUDFLARE_ZONE_ID (secret or var) on the '$env' environment"; fail=1; }
          [ "$TF_VAR_ssh_public_keys" != '[""]' ] || { echo "::error::set vars.APPS_OPERATOR_SSH_KEY on the '$env' environment"; fail=1; }
          [ -n "$TF_VAR_apps_base_domain" ] || { echo "::error::set vars.APPS_BASE_DOMAIN on the '$env' environment (distinct per env — apps.elizacloud.ai prod / apps-staging.elizacloud.ai staging)"; fail=1; }
          [ -n "$TF_VAR_operator_ingress_cidrs" ] || { echo "::error::set vars.OPERATOR_INGRESS_CIDRS on the '$env' environment (JSON array of allowed SSH CIDRs, no 0.0.0.0/0)"; fail=1; }
          [ -n "$TF_VAR_cloud_api_origin" ] || { echo "::error::set vars.APPS_CLOUD_API_ORIGIN on the '$env' environment (https://api-staging.elizacloud.ai staging / https://api.elizacloud.ai prod)"; fail=1; }
          # Defense in depth: reject 0.0.0.0/0 here too, before TF validation
          # runs — fails the workflow earlier with a clearer error.
          case "$TF_VAR_operator_ingress_cidrs" in
            *'0.0.0.0/0'*|*'::/0'*)
              echo "::error::OPERATOR_INGRESS_CIDRS contains '0.0.0.0/0' or '::/0' — module validation rejects these; pin to operator IPs"
              fail=1
              ;;
          esac
          exit $fail

      - name: terraform fmt -check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

      - name: terraform init (R2 backend, lockfile readonly)
        working-directory: ${{ env.TF_DIR }}
        # -lockfile=readonly fails the run if the committed .terraform.lock.hcl
        # would need updating (e.g. provider checksum drift). Forces operators
        # to run `terraform init -upgrade` in a PR explicitly.
        run: terraform init -input=false -lockfile=readonly -backend-config="backend-${{ github.event.inputs.environment }}.hcl"

      - name: terraform plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -no-color -input=false

      - name: terraform apply
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_DIR }}
        # `replace` input is a comma-separated list of TF resource addresses to
        # force-replace this run. Empty -> normal apply. NOTE: tenant_db lives
        # in apps-shared now — `-replace=hcloud_server.tenant_db` here is a
        # no-op; use the terraform-apps-shared workflow instead.
        # See terraform-control-plane.yml for why we thread the input via $env
        # instead of inline `${{ ... }}` (quote handling).
        env:
          REPLACE_INPUT: ${{ github.event.inputs.replace }}
        run: |
          REPLACE_ARGS=()
          if [ -n "$REPLACE_INPUT" ]; then
            IFS=',' read -ra ADDRS <<< "$REPLACE_INPUT"
            for addr in "${ADDRS[@]}"; do
              addr_trimmed="${addr#"${addr%%[![:space:]]*}"}"
              addr_trimmed="${addr_trimmed%"${addr_trimmed##*[![:space:]]}"}"
              [ -n "$addr_trimmed" ] && REPLACE_ARGS+=("-replace=$addr_trimmed")
            done
            echo "::notice::forcing replacement of: ${REPLACE_ARGS[*]}"
          fi
          # Retry only the transient Hetzner primary-IP-pool blip
          # (422 ip_not_available): server-create auto-assigns a fresh primary
          # IPv4/IPv6 and the location pool can be momentarily exhausted. apply
          # is idempotent (already-created resources are in R2 state) and the
          # terraform-apps-hetzner concurrency group single-flights this run,
          # so re-running just continues. Any OTHER error fails fast.
          attempt=1
          max_attempts=5
          while true; do
            out="$(terraform apply -auto-approve -input=false "${REPLACE_ARGS[@]}" 2>&1)" && { echo "$out"; break; }
            echo "$out"
            if echo "$out" | grep -q 'ip_not_available' && [ "$attempt" -lt "$max_attempts" ]; then
              sleep $(( attempt * 30 ))
              echo "::warning::transient Hetzner ip_not_available; retry $((attempt+1))/$max_attempts"
              attempt=$((attempt+1))
              continue
            fi
            exit 1
          done
