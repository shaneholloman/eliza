name: Setup Bun Workspace Self-Test

on:
  pull_request:
    paths:
      - ".github/actions/setup-bun-workspace/**"
      - ".github/workflows/setup-bun-workspace-self-test.yml"
  workflow_dispatch:

# #14051 Tier B: cancel superseded self-test runs on rapid pushes to the
# setup-bun action so iterating on it doesn't queue duplicate fleet jobs.
concurrency:
  group: setup-bun-workspace-self-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  protoc-github-fallback:
    name: forced protoc GitHub fallback
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Exercise pinned protoc fallback path
        uses: ./.github/actions/setup-bun-workspace
        with:
          setup-python: "false"
          install-protoc: "true"
          force-protoc-github-fallback: "true"
          install-native-deps: "false"
          install-command: "true"
          run-postinstall: "false"
          init-submodules: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"
