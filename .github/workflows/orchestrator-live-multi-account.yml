# Orchestrator — LIVE multi-account lane (scheduled, secret-gated)
#
# The real-account counterpart to the per-PR secret-free lane
# (orchestrator-multi-account.yml, which uses a fake `acpx`). This seeds the
# account pool from REAL Claude (anthropic-subscription OAuth) and Codex
# (openai-codex auth.json) credentials and asserts the coding-account bridge
# selects, injects, and ROTATES across DISTINCT accounts per provider (#9960).
#
# OPERATOR PREREQUISITE: add the live-account secrets below. With them ABSENT
# this workflow SKIPS GRACEFULLY (exit 0 + ::notice::) — it never fails CI when
# the secrets are not configured (mirrors benchmark-orchestrator-scheduled.yml).
#
# Required repo secrets (1 each minimum; add _2 for real rotation):
#   ELIZA_LIVE_CLAUDE_OAUTH_TOKEN_1[, _2]   Claude Code OAuth token(s)
#   ELIZA_LIVE_CODEX_AUTH_JSON_1[, _2]      full ~/.codex/auth.json contents
#
# Produce/refresh these blobs from a connected machine with:
#   bun run --cwd plugins/plugin-agent-orchestrator export:ci-account-secrets --index 1 --gh
# The Codex token is short-lived — schedule the refresh (re-run export + update
# the secret) so this lane stays green.

name: Orchestrator live multi-account

on:
  schedule:
    # Tuesdays 06:00 UTC — weekly real-account rotation smoke.
    - cron: "0 6 * * 2"
  workflow_dispatch:
    inputs:
      rotation:
        description: "Assert ≥2 distinct accounts per provider (needs _2 secrets)"
        required: false
        type: boolean
        default: false

concurrency:
  group: orchestrator-live-multi-account-${{ github.ref }}
  cancel-in-progress: false

# Default to least privilege.
permissions:
  contents: read

env:
  BUN_VERSION: "canary"
  NODE_VERSION: "24"

jobs:
  live-multi-account:
    name: live multi-account rotation
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 30
    env:
      ELIZA_LIVE_CLAUDE_OAUTH_TOKEN_1: ${{ secrets.ELIZA_LIVE_CLAUDE_OAUTH_TOKEN_1 }}
      ELIZA_LIVE_CLAUDE_OAUTH_TOKEN_2: ${{ secrets.ELIZA_LIVE_CLAUDE_OAUTH_TOKEN_2 }}
      ELIZA_LIVE_CODEX_AUTH_JSON_1: ${{ secrets.ELIZA_LIVE_CODEX_AUTH_JSON_1 }}
      ELIZA_LIVE_CODEX_AUTH_JSON_2: ${{ secrets.ELIZA_LIVE_CODEX_AUTH_JSON_2 }}
    steps:
      # ------------------------------------------------------------------
      # Gate: skip everything (exit 0) when the live secrets are unset, so this
      # workflow never fails CI when they are not configured.
      # ------------------------------------------------------------------
      - name: Check live-account secrets
        id: gate
        run: |
          set -euo pipefail
          if [ -z "${ELIZA_LIVE_CLAUDE_OAUTH_TOKEN_1:-}" ] || [ -z "${ELIZA_LIVE_CODEX_AUTH_JSON_1:-}" ]; then
            echo "::notice::Live multi-account lane skipped — set ELIZA_LIVE_CLAUDE_OAUTH_TOKEN_1 and ELIZA_LIVE_CODEX_AUTH_JSON_1 (see workflow header) to enable real-account rotation."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        if: steps.gate.outputs.skip != 'true'
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile

      # Seeds the REAL AccountPool + coding-account-bridge from the secrets,
      # asserts per-provider selection + credential injection + distinct-account
      # rotation. The script itself also exits 0 + ::notice:: if a credential is
      # malformed, so a bad secret degrades to a skip rather than a hard failure.
      - name: Run live multi-account rotation
        if: steps.gate.outputs.skip != 'true'
        run: bun run --cwd plugins/plugin-agent-orchestrator test:e2e:multi-account:live
