  app-walkthrough-mock:
    name: Zero-Key full-walkthrough (mock lane)
    needs: changes
    if: needs.changes.outputs.run_scenario_pr == 'true'
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 45
    steps:
