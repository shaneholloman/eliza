      - name: Ensure generated shared i18n data
        run: node packages/app-core/scripts/ensure-shared-i18n-data.mjs

      - name: Electrobun window and dynamic-view coverage
        run: bun run --cwd packages/app-core/platforms/electrobun test src/native/desktop-window.test.ts src/rpc-handlers.test.ts src/dynamic-view-rpc-schema.test.ts src/surface-windows.test.ts src/dynamic-views/host.test.ts src/application-menu.test.ts

      - name: View management action coverage
        run: bun run --cwd plugins/plugin-app-control test -- src/actions/views-management.test.ts

      - name: App verification diagnostics coverage
        run: bun run --cwd plugins/plugin-app-control test -- src/services/__tests__/app-verification.integration.test.ts src/services/__tests__/verification-room-bridge.test.ts

      - name: Computer-use screenshot quality diagnostics coverage
        run: bun run --cwd plugins/plugin-computeruse test -- test/helpers/screenshot-quality.test.ts src/__tests__/browser-auto-open.test.ts

      - name: App screenshot quality diagnostics coverage
        run: bun run --cwd packages/app test -- test/screenshot-quality.test.ts

      - name: App-core screenshot quality diagnostics coverage
        run: bun run --cwd packages/app-core test -- test/app/screenshot-quality.test.ts

  scenario-runner-e2e:
    name: Zero-Key scenario runner E2E
    needs: changes
    if: needs.changes.outputs.run_scenario_pr == 'true'
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Ensure generated shared i18n data
        run: node packages/app-core/scripts/ensure-shared-i18n-data.mjs

      - name: Scenario catalog coverage gate
        run: node packages/scripts/check-scenario-workflow-coverage.mjs --report-dir reports/scenarios/catalog-inventory

      # Unit-tests the cross-package test runner's pool + shard logic
      # (packages/scripts/lib/test-task-pool.mjs). Lives here because
      # packages/scripts/__tests__ bun:test files only run when a workflow
      # invokes them explicitly (the dir is not a workspace member).
      - name: Test-runner pool + shard unit tests
        run: bun test packages/scripts/__tests__/test-task-pool.test.ts

      # Contract-tests the cloud agent image workflow's Turbo build step.
      # packages/scripts/__tests__ is outside workspace test discovery, so keep
      # this explicit or the workflow contract can silently stop running in CI.
      - name: Agent image workflow contract
        run: bun test packages/scripts/__tests__/build-agent-image-workflow.test.ts

      # Drift guard for the build:core package set + delegation (issue #10200).
      # packages/scripts/__tests__ is outside workspace test discovery, so keep
      # this explicit or the guard silently stops running in CI.
      - name: build:core package-set drift guard
        run: bun test packages/scripts/__tests__/build-core.test.ts

      # Self-test for the shared plugin build driver (issue #10200): 57 plugin
      # build.ts files delegate to buildPlugin; this drives it against fixture
      # packages and asserts the real emitted dist/ tree.
      - name: Shared plugin-build driver self-test
        run: bun test packages/scripts/__tests__/plugin-build.test.ts

      # Smoke-tests the packages/app extension of the script inventory tool
      # (issue #10200, item 2) — the second dense script surface.
      - name: Script inventory (packages/app) smoke test
        run: bun test packages/scripts/__tests__/audit-scripts-inventory.test.ts

      # #9310 §E: guarded *.real/*.live suite accounting. Keeps the post-merge
      # lane's named-skip summary honest: manifest ↔ on-disk drift, phantom
      # guard credentials, and vitest configs that would silently re-exclude a
      # guarded suite from every lane. packages/scripts/__tests__ is outside
      # workspace test discovery, so keep this explicit.
      - name: Real/live guarded-suite manifest gate
        run: bun test packages/scripts/__tests__/real-live-suites.test.ts

      # #9310 §3.16: every packages/ui __e2e__ run-*.mjs fixture runner must
      # have a package script AND a workflow leg (ui-fixture-e2e.yml et al) —
      # a runner nothing invokes is coverage that does not exist.
      - name: UI fixture-runner CI-coverage ratchet
        run: bun test packages/scripts/__tests__/ui-e2e-runner-coverage.test.ts

      # E2E coverage gate (issue #8802). Now REQUIRED: the baseline is green —
      # commands 38/38, #8791 shortcuts 1/1 (wired into SHORTCUT_COVERAGE),
      # plugin routes covered/exempt, view ship-gates intact, zero blocking gaps.
      # The advisory cycle is complete, so the ratchets (route-manifest lockstep,
      # zero-test plugins, no-blocking-gaps) now fail the build on regression.
      - name: E2E coverage ship-gate
        env:
          E2E_COVERAGE_GATE_ENFORCE: "1"
        run: bun test packages/scripts/__tests__/e2e-coverage.test.ts

      # Per-plugin keyless-e2e coverage gate (issue #8801). The surface matrix
      # above proves app-facing routes/views; this ratchet proves each plugin
      # with user-facing capabilities has a deterministic, credential-free
      # scenario or an explicit baseline entry.
      - name: Per-plugin keyless e2e coverage self-test
        run: bun test packages/scripts/e2e-coverage/check-e2e-coverage.test.ts

      - name: Per-plugin keyless e2e coverage gate
        run: bun run audit:e2e-coverage

      - name: E2E coverage matrix report
        if: always()
        run: bun packages/scripts/e2e-coverage/write-coverage-matrix-report.ts --report-dir reports/coverage

      - name: Build workspace packages for scenario resolution
        run: bun run build:core && bunx turbo run build --filter=@elizaos/plugin-github

      - name: Zero-cost scenario e2e
        run: bun run --cwd packages/scenario-runner test:pr:e2e

      - name: Upload scenario report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: scenario-pr-deterministic-report
          path: |
            reports/scenarios/pr-deterministic/
            reports/scenarios/pr-deterministic-orchestrator/
            reports/scenarios/catalog-inventory/
            reports/coverage/
          if-no-files-found: ignore
          retention-days: 3

  deterministic-scenario:
    name: Zero-Key Deterministic E2E
    needs:
      - changes
      - scenario-unit-coverage
      - app-browser-core
      - app-browser-view-lifecycle
      - app-browser-all-pages
      - app-browser-feature-interactions
      - app-browser-cloud-keyless
      - app-browser-ratcheted
      - app-browser-auto-discovered
      - app-browser-touch-dashboard
      - app-browser-touch-mobile
      - app-browser-webkit
      - app-accounts-ui
      - app-walkthrough-mock
      - app-diagnostics
      - scenario-runner-e2e
    if: ${{ !cancelled() && always() && needs.changes.outputs.run_scenario_pr == 'true' }}
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    steps:
      - name: Check deterministic E2E slices
        shell: bash
        run: |
          set -u
          bad=0
          for pair in \
            "scenario-unit-coverage:${{ needs.scenario-unit-coverage.result }}" \
            "app-browser-core:${{ needs.app-browser-core.result }}" \
            "app-browser-view-lifecycle:${{ needs.app-browser-view-lifecycle.result }}" \
            "app-browser-all-pages:${{ needs.app-browser-all-pages.result }}" \
            "app-browser-feature-interactions:${{ needs.app-browser-feature-interactions.result }}" \
            "app-browser-cloud-keyless:${{ needs.app-browser-cloud-keyless.result }}" \
            "app-browser-ratcheted:${{ needs.app-browser-ratcheted.result }}" \
            "app-browser-auto-discovered:${{ needs.app-browser-auto-discovered.result }}" \
            "app-browser-touch-dashboard:${{ needs.app-browser-touch-dashboard.result }}" \
            "app-browser-touch-mobile:${{ needs.app-browser-touch-mobile.result }}" \
            "app-browser-webkit:${{ needs.app-browser-webkit.result }}" \
            "app-accounts-ui:${{ needs.app-accounts-ui.result }}" \
            "app-walkthrough-mock:${{ needs.app-walkthrough-mock.result }}" \
            "app-diagnostics:${{ needs.app-diagnostics.result }}" \
            "scenario-runner-e2e:${{ needs.scenario-runner-e2e.result }}"; do
            name="${pair%%:*}"
            result="${pair##*:}"
            echo "$name: $result"
            if [ "$result" != "success" ]; then
              echo "::error title=Scenario PR E2E::$name finished with $result"
              bad=1
            fi
          done
          if [ "$bad" -ne 0 ]; then
            exit 1
          fi
          echo "All deterministic E2E slices passed."
