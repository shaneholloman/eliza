name: Self-Hosted Fleet Probe

# TEMPORARY diagnostic. Prints the hetzner-robot self-hosted runner
# environment so we can safely retarget test.yml off the billing-frozen
# GitHub-hosted ubuntu-24.04 runners. workflow_dispatch only; not part of
# any required status check. Delete after the retarget lands.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    name: Probe self-hosted environment
    runs-on: [self-hosted, hetzner-robot]
    timeout-minutes: 10
    steps:
      - name: Environment inventory
        shell: bash
        run: |
          set +e
          echo "=== identity ==="
          whoami; id
          echo "HOME=$HOME  PWD=$PWD  RUNNER_NAME=$RUNNER_NAME"
          echo "=== os ==="
          uname -a
          cat /etc/os-release 2>/dev/null | head -4
          echo "=== resources ==="
          nproc
          free -h
          df -h "$HOME" /tmp . 2>/dev/null
          echo "=== toolchain (system) ==="
          for t in node npm bun bunx cargo rustc protoc docker git python3 pip3 make gcc; do
            p="$(command -v $t 2>/dev/null)"
            if [ -n "$p" ]; then printf '%-8s %s  ' "$t" "$p"; $t --version 2>/dev/null | head -1; echo; else echo "$t   MISSING"; fi
          done
          echo "=== sudo ==="
          if sudo -n true 2>/dev/null; then echo "passwordless sudo: YES"; else echo "passwordless sudo: NO"; fi
          echo "=== docker daemon ==="
          docker info >/dev/null 2>&1 && echo "docker daemon: reachable" || echo "docker daemon: NOT reachable"
          echo "=== native libs for canvas/playwright ==="
          for lib in libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev; do
            dpkg -s "$lib" >/dev/null 2>&1 && echo "$lib: installed" || echo "$lib: absent"
          done
          echo "=== playwright browsers cache ==="
          ls -la "$HOME/.cache/ms-playwright" 2>/dev/null | head || echo "no ms-playwright cache"
          echo "=== bun store ==="
          ls -la "$HOME/.bun/install/cache" 2>/dev/null | head -3 || echo "no bun cache"
          echo "=== concurrent-runner siblings on this box ==="
          ls -d /opt/actions-runners/runner-* 2>/dev/null | wc -l
          echo "DONE"
