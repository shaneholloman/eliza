# Triggers the homebrew tap repo to update formula + cask
# when a new GitHub release is published.
#
# Required secret: HOMEBREW_TAP_TOKEN
#   A GitHub PAT with repo scope for elizaOS/homebrew-tap

name: Update Homebrew Tap

on:
  workflow_call:
    inputs:
      version:
        description: "Version to update to (e.g. 2.0.0-beta.0)"
        required: true
        type: string
    secrets:
      # Marked `required: false` so this reusable workflow's secret
      # contract does not abort the parent at startup when called via
      # `secrets: inherit` from release-orchestrator.yml. The job body
      # now has a Check credentials step that emits a warning + skips
      # the dispatch when HOMEBREW_TAP_TOKEN is empty. Mirrors the
      # pattern used in publish-apt-repo.yml (PR #7976).
      HOMEBREW_TAP_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update to (e.g. 2.0.0-beta.0)"
        required: true
        type: string

concurrency:
  group: update-homebrew-${{ github.ref }}
  cancel-in-progress: true

# Default to least privilege. Override per-job where needed.
permissions:
  contents: read

jobs:
  update-tap:
    name: Trigger Homebrew tap update
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    steps:
      - name: Check credentials
        id: creds
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "$HOMEBREW_TAP_TOKEN" ]]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not configured. Homebrew tap update skipped."
            echo "can_dispatch=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_dispatch=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version
        if: steps.creds.outputs.can_dispatch == 'true'
        id: meta
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Triggering Homebrew update for version: $VERSION"

      - name: Dispatch to homebrew-tap
        if: steps.creds.outputs.can_dispatch == 'true'
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: elizaOS/homebrew-tap
          event-type: update-homebrew
          client-payload: '{"version": "${{ steps.meta.outputs.version }}"}'
