name: Tests

# Comprehensive test orchestrator. Runs the full eliza test suite plus
# focused server/client/plugin slices and the database security guard.
# This is a peer of `ci.yaml` — `ci.yaml` is the canonical lint+typecheck+
# build+core-test gate; this workflow adds the broader integration surface.

on:
  # Post-merge integration surface. PRs to `develop` run the lightweight
  # lint/typecheck/build gate (develop-pr.yml); the full suite runs here once
  # changes land on `develop`, plus nightly and on demand.
  push:
    branches: [develop]
  workflow_dispatch:
  schedule:
    # Nightly live smoke for container-backed remote capability plugins.
    - cron: "17 9 * * *"

# CI fan-out fix: the PR-scoped concurrency from #14069 fell back to
# github.run_id on push, so every develop push got a unique group and
# nothing ever superseded. A 37-merge wave queued thousands of push runs
# and starved the self-hosted fleet. Fall back to github.ref (all develop
# pushes share a group) and cancel superseded runs on push too. PR behavior
# is unchanged (pull_request.number still wins the key); merge_group and
# schedule events are not in the cancel set, so the merge queue and nightly
# runs always complete.
concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

env:
  CI: "true"
  # pinned: floating canary hangs `bun install` on hosted CI runners and writes
  # lockfileVersion 2 which breaks --frozen-lockfile (#11184/#9454). This env
  # drives the integration/unit/lint/cloud-live-e2e jobs' bun-version input.
  BUN_VERSION: "1.3.14"
  NODE_VERSION: "24.15.0"
  NODE_NO_WARNINGS: "1"
  NODE_OPTIONS: "--max-old-space-size=8192"
  # Baseline PR jobs are secret-free. Dedicated live jobs inject provider keys
  # locally and remain opt-in/scheduled where external services are involved.

# Default to least privilege. Override per-job where needed.
permissions:
  contents: read

jobs:
  stale-base-preflight:
    name: PR stale-base preflight
    # PR-only in EFFECT — every step gates on github.event_name ==
    # 'pull_request' — but the JOB itself runs (and no-op-succeeds) on every
    # event. It used to be job-level `if: github.event_name == 'pull_request'`,
    # which SKIPPED it on push; because `changes` needs this job and GitHub
    # evaluates the implicit success() over the TRANSITIVE needs chain
    # (actions/runner#491), that one skipped ancestor silently skip-cascaded
    # every push-event lane downstream of `changes` whose `if` carries no
    # status-check function — develop push runs went vacuously red from the
    # moment the needs edge landed. Step-level gating keeps the PR-only
    # contract (ci-merge-gate-contract.mjs) and the `changes` ordering while
    # letting push/schedule/dispatch fan-outs actually run.
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 10
    env:
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      ACK: ${{ contains(github.event.pull_request.labels.*.name, 'stale-base-ack') && '1' || '' }}
    steps:
      - name: Checkout target branch (guard logic comes from the base, not the PR)
        if: github.event_name == 'pull_request'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          # The guard disables lazy promisor fetches while it runs. Fetch the
          # same bounded history window up front so merge commits can resolve
          # their parents without network fallback.
          fetch-depth: 1500
          filter: blob:none
          submodules: false

      - name: Setup Node.js for stale-base guard
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Fetch PR head + bounded history (blobless)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --quiet --no-tags --filter=blob:none --depth=1500 \
            "https://github.com/${HEAD_REPO}.git" "$HEAD_SHA"
          git fetch --quiet --no-tags --filter=blob:none --depth=1500 origin \
            "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"

      - name: Self-test the guard on fixture repos
        if: github.event_name == 'pull_request'
        run: node packages/scripts/stale-base-guard.self-test.mjs

      - name: Detect silent reverts + stale base before fanning out tests
        if: github.event_name == 'pull_request'
        env:
          GIT_NO_LAZY_FETCH: "1"
        run: |
          set -euo pipefail
          node packages/scripts/stale-base-guard.mjs \
            --base "refs/remotes/origin/${BASE_REF}" \
            --head "$HEAD_SHA" \
            --window 1200 \
            --max-behind-commits 200 \
            --max-behind-hours 72 \
            ${ACK:+--ack} \
            --github \
            --summary "$GITHUB_STEP_SUMMARY"

  changes:
    name: Classify changed paths
    needs: stale-base-preflight
    if: always() && (github.event_name != 'pull_request' || needs.stale-base-preflight.result == 'success')
    # Route with the same fleet-aware conditional as the test lanes. GitHub-hosted
    # runners are billing-frozen (#13481), so a hardcoded ubuntu-24.04 here queued
    # forever and — since every lane needs this classifier — stalled the entire
    # ci-ok chain while the self-hosted fleet sat idle. Self-hosted when online;
    # hosted only when an operator flags the fleet down (and billing is restored).
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 10
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
      plugins: ${{ steps.filter.outputs.plugins }}
      desktop: ${{ steps.filter.outputs.desktop }}
      zero_key: ${{ steps.filter.outputs.zero_key }}
      cloud: ${{ steps.filter.outputs.cloud }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node.js for path gate
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate CI path gate
        run: node packages/scripts/ci-path-gate.self-test.mjs

      - name: Validate CI workflow dedup contract
        run: node packages/scripts/ci-workflow-dedup-contract.mjs

      - name: Validate GitHub-native turbo cache contract
        run: node packages/scripts/ci-turbo-cache-contract.mjs

      - name: Validate CI Bun version pin contract
        run: node packages/scripts/ci-bun-version-contract.mjs

      - name: Validate zero-key command ownership contract
        run: node packages/scripts/ci-zero-key-command-ownership-contract.mjs

      - name: Validate Windows command coverage contract
        run: node packages/scripts/ci-windows-command-coverage-contract.mjs

      - name: Install alias-read guard parser dependency
        run: npm install --prefix "$RUNNER_TEMP/alias-read-guard-deps" --no-save --no-package-lock --ignore-scripts typescript@6.0.3

      - name: Validate brand-env alias-read guard self-test
        env:
          NODE_PATH: ${{ runner.temp }}/alias-read-guard-deps/node_modules
        run: node packages/scripts/alias-read-guard.mjs --self-test

      - name: Validate merge-gate robustness contract self-test
        run: node packages/scripts/ci-merge-gate-contract.mjs --self-test

      - name: Validate merge-gate robustness contract
        run: node packages/scripts/ci-merge-gate-contract.mjs

      - name: Determine affected test lanes
        id: filter
        shell: bash
        env:
          PR_LABELS: ${{ github.event_name == 'pull_request' && join(github.event.pull_request.labels.*.name, ',') || '' }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "merge_group" ]; then
            {
              echo "server=true"
              echo "client=true"
              echo "plugins=true"
              echo "desktop=true"
              echo "zero_key=true"
              echo "cloud=true"
            } >> "$GITHUB_OUTPUT"
            {
              echo "### Tests path gate"
              echo
              echo "Merge queue runs validate the synthesized queue SHA, so path"
              echo "diffs are deliberately not used. Running the full required"
              echo "test suite for the \`ci-ok\` aggregate check."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          node packages/scripts/ci-path-gate.mjs \
            --config test \
            --event "${{ github.event_name }}" \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --labels "$PR_LABELS" \
            --output "$GITHUB_OUTPUT" \
            --summary "$GITHUB_STEP_SUMMARY"

  test-runner-vacuous-green-guard:
    name: Test-runner vacuous-green guard
    needs: changes
    # #13620/#12342: this guard protects the ordinary PR path from runner lanes
    # that collect no real tests or swallow a failure as "no tests found".
    # Keep it outside path gates and outside the opt-in `ci:full` heavy family.
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Test-runner vacuous-green guard
        run: bun test packages/scripts/__tests__/run-all-tests-vacuous-green-guard.test.ts

  server-tests:
    name: Server Tests
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.server == 'true'
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 60
    env:
      PGLITE_WASM_MODE: node
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Build view bundles
        run: bun run build:views

      - name: Views system tests
        run: bunx vitest run packages/agent/src/__tests__/views-system-smoke.test.ts packages/agent/src/__tests__/views-registry-integration.test.ts packages/agent/src/__tests__/plugin-tui-view-coverage.test.ts

      - name: Terminal TUI PTY and smoke coverage
        run: |
          bunx vitest run --config packages/agent/vitest.config.ts packages/agent/src/__tests__/agent-terminal-tui.test.ts --coverage.enabled=false
          cat > /tmp/eliza-tui-mock-server.cjs <<'NODE'
          const http = require("node:http");
          const fs = require("node:fs");
          const server = http.createServer((req, res) => {
            const url = new URL(req.url || "/", "http://127.0.0.1");
            res.setHeader("Content-Type", "application/json");
            if (req.method === "GET" && url.pathname === "/api/views") {
              res.end(JSON.stringify({ views: [{ id: "messages", label: "Messages TUI", path: "/messages/tui", viewType: "tui" }] }));
              return;
            }
            if (req.method === "GET" && url.pathname === "/api/commands") {
              res.end(JSON.stringify({ commands: [], surface: "tui", agentId: null, generatedAt: new Date(0).toISOString() }));
              return;
            }
            res.statusCode = 404;
            res.end(JSON.stringify({ error: "not found" }));
          });
          server.listen(0, "127.0.0.1", () => {
            const { port } = server.address();
            fs.writeFileSync("/tmp/eliza-tui-api-url", `http://127.0.0.1:${port}`);
          });
          NODE
          node /tmp/eliza-tui-mock-server.cjs &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 80); do
            test -s /tmp/eliza-tui-api-url && break
            sleep 0.1
          done
          api_url="$(cat /tmp/eliza-tui-api-url)"
          timeout 30s bun --conditions=eliza-source packages/agent/src/bin.ts tui-smoke --api "$api_url" | tee /tmp/eliza-tui-smoke.log
          grep -q "elizaos-tui-ready api=$api_url" /tmp/eliza-tui-smoke.log

      - name: Remote capability router tests
        run: bun run test:remote-capabilities

      - name: Remote capability plugin surface audit
        run: bun run test:remote-capabilities:surface-audit

      - name: Remote capability live CI audit
        run: bun run test:remote-capabilities:live-ci-audit

      - name: Remote capability live CI audit self-test
        run: bun run test:remote-capabilities:live-ci-audit:self-test

      - name: Remote capability naming audit
        run: bun run test:remote-capabilities:naming-audit

      - name: Remote capability naming audit self-test
        run: bun run test:remote-capabilities:naming-audit:self-test

      - name: Remote capability source-build smoke
        run: bun run test:remote-capabilities:source-build

      - name: Remote capability fixture server smoke
        run: bun run test:remote-capabilities:fixture-server

      - name: Remote capability live report validator self-test
        run: bun run test:remote-capabilities:validate-live-reports:self-test

      - name: Remote capability GitHub live evidence self-test
        run: bun run test:remote-capabilities:github-live-evidence:self-test

      - name: Remote capability GitHub live artifact self-test
        run: bun run test:remote-capabilities:github-live-artifacts:self-test

      - name: Remote capability Docker smoke
        run: bun run test:remote-capabilities:docker

      # TUI_EVIDENCE_DIR must be step-level: the `runner` context does not
      # exist in job-level `env`, and a job-level reference makes GitHub
      # reject the entire workflow file ("workflow file issue" on every run).
      # The TUI e2e capture test writes its .cast / viewport / scrollback
      # artifacts here during `test:server`; the upload step below attaches them.
      - name: Run server tests
        env:
          TUI_EVIDENCE_DIR: ${{ runner.temp }}/evidence/9969-tui-e2e
        run: bun run test:server

      # Real-PTY smoke: spawns the packaged `tui` under a true TTY to exercise
      # ProcessTerminal / Kitty / stdin / resize end to end. Skips cleanly if
      # @lydell/node-pty has no usable prebuild on the runner.
      - name: Real-PTY TUI smoke
        env:
          TUI_EVIDENCE_DIR: ${{ runner.temp }}/evidence/9969-tui-e2e
        run: bun run --cwd packages/agent test:tui-pty

      # The TUI e2e capture test (packages/agent/test/tui-e2e/tui-capture.test.ts)
      # records each session as an asciicast .cast plus viewport/scrollback
      # snapshots into TUI_EVIDENCE_DIR. Attach them so a reviewer can replay the
      # terminal session (`asciinema play session.cast`) — the screen/output/video
      # capture for the TUI surface (#9944).
      - name: Upload TUI e2e capture artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: tui-e2e-artifacts
          path: ${{ runner.temp }}/evidence/9969-tui-e2e/
          if-no-files-found: ignore

  client-tests:
    name: Client Tests
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.client == 'true'
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      # @elizaos/tui first: the packages/ui spatial-view tests
      # (src/spatial/__tests__/*) import @elizaos/ui/spatial/tui, whose terminal
      # renderer externalizes @elizaos/tui — without its dist, vitest fails to
      # resolve the package and the test files load "0 test".
      - name: Build @elizaos/tui for spatial-view tests
        run: bun run --cwd packages/tui build

      - name: Run client tests
        run: bun run test:client

      - name: Install Playwright Chromium
        run: .github/scripts/install-playwright-browsers.sh chromium

      - name: Remote capability UI smoke
        run: bun run test:remote-capabilities:ui

      # Perf gate (#9954): drive REAL overlay thread-scroll + pull-to-maximize /
      # top-pull-restore in headless chromium, feed REAL rAF/longtask/layout-shift
      # entries through the shared frame-budget + layout-stability detectors,
      # HARD-FAIL on dropped frames, p95 frame time, or CLS. The gate first proves
      # its CLS detector has teeth by injecting a real non-transient shift and
      # asserting it is flagged (#14333), so a true CLS of 0.0000 cannot be a
      # vacuous pass from a dead observer or an over-broad transient marker.
      - name: Perf gate e2e (#9954)
        run: bun run --cwd packages/ui test:perf-gate-e2e

      - name: Upload perf gate e2e artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: perf-gate-e2e-artifacts
          path: packages/ui/src/components/shell/__e2e__/output-perf-gate-e2e/
          if-no-files-found: ignore

  xr-harness-e2e:
    name: XR harness e2e
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.plugins == 'true'
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      # app-xr is the surviving XR harness (facewear supersedes the retired
      # plugin-xr — #9941). It is a nested, non-workspace package whose deps
      # (@playwright/test, vite, @elizaos/core) resolve up to the root workspace
      # install above — running `bun install` inside it would fail on its
      # `workspace:*` core dep, so we only install Chromium here. `test:e2e`
      # builds the nested emulator package (`build:emulator`), then drives
      # Playwright against the real view-host route with the IWER emulator
      # injected.
      - name: Install Playwright Chromium
        run: .github/scripts/install-playwright-browsers.sh chromium

      - name: Run facewear app-xr e2e (real view-host route + IWER emulator)
        run: bun run --cwd plugins/plugin-facewear/app-xr test:e2e

      - name: Upload XR capture artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: xr-harness-artifacts
          path: |
            plugins/plugin-facewear/app-xr/test-results/
          if-no-files-found: ignore

  plugin-tests:
    name: Plugin Tests (${{ matrix.shard }}/4)
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.plugins == 'true'
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 95
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      TEST_SHARD: ${{ matrix.shard }}/4
      # Share compiled rust artifacts across all plugin crates so the
      # `elizaos = "2.0.0"` crate (and its sqlx/hyper/etc transitive deps)
      # only compiles once, not once per plugin. Without this, each
      # plugin-{discord,groq,openai,sql,whatsapp} rebuilds the same heavy
      # dep tree from scratch, blowing past the step timeout.
      CARGO_TARGET_DIR: ${{ github.workspace }}/.cargo-shared-target
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Cache cargo registry and shared target dir
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/.cargo-shared-target
          key: ${{ runner.os }}-cargo-plugin-tests-${{ hashFiles('plugins/*/rust/Cargo.lock', 'plugins/*/rust/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-plugin-tests-

      # The view-bundle coverage tests assert every view plugin has a built
      # dist/views/bundle.js; build them before running plugin tests.
      # @elizaos/tui first: the spatial-view tests (45 plugins) import
      # @elizaos/ui/spatial/tui, whose terminal renderer externalizes
      # @elizaos/tui — without its dist, vitest fails to resolve the package.
      - name: Build view bundles
        run: |
          bun run --cwd packages/tui build
          bun run build:views

      - name: Run plugin tests
        # Cap step below the 95m job budget so a flaky plugin
        # (most recently plugin-shell rust PTY tests in run 25234887145)
        # fails fast instead of burning the whole job's wall clock.
        timeout-minutes: 85
        run: bun run test:plugins

      - name: Prune cargo cache payload
        if: always()
        run: |
          node packages/scripts/rm-path-recursive.mjs \
            "${CARGO_TARGET_DIR}/debug/incremental" \
            "${CARGO_TARGET_DIR}/debug/.fingerprint" \
            "${CARGO_TARGET_DIR}/debug/build" \
            "${CARGO_TARGET_DIR}/debug/examples" \
            "${CARGO_TARGET_DIR}/release/incremental" \
            "${CARGO_TARGET_DIR}/release/.fingerprint" \
            "${CARGO_TARGET_DIR}/release/build" \
            "${CARGO_TARGET_DIR}/release/examples"
          find "${CARGO_TARGET_DIR}" -type f \( -name '*.d' -o -name '*.rlib' -o -name '*.rmeta' \) -delete 2>/dev/null || true

  plugin-tests-status:
    name: Plugin Tests
    needs:
      - changes
      - plugin-tests
    if: ${{ !cancelled() && always() }}
    # Fleet-aware (see `changes`): hardcoded hosted froze this ci-ok dependency.
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 10
    steps:
      - name: Check plugin shard results
        shell: bash
        run: |
          set -u
          result="${{ needs.plugin-tests.result }}"
          echo "plugin-tests matrix: ${result}"
          if [ "$result" = "success" ]; then
            exit 0
          fi
          if [ "$result" = "skipped" ] && [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ needs.changes.outputs.plugins }}" != "true" ]; then
            echo "::notice title=Plugin Tests::Path gate skipped plugin tests for this PR context."
            exit 0
          fi
          echo "::error title=Plugin Tests::Plugin shard matrix finished with '${result}'"
          exit 1

  # First CI consumer of the repo-level integration lane
  # (packages/test/vitest/integration.config.ts). The lane was dead in CI:
  # nothing invoked the config, its @elizaos/core alias broke the /node
  # subpath, and its eliza/-prefixed paths matched zero files in a flat
  # checkout (#11047). Runs plugin-personal-assistant's test:integration —
  # the src-integration lane (scheduler/recurrence/global-pause real-DB
  # suites) plus the repo config over the package's named test/ files —
  # keyless. Burn down the remaining plugins/*/test integration suites from
  # here.
  integration-tests:
    name: Integration Lane (personal-assistant)
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.plugins == 'true' || needs.changes.outputs.server == 'true'
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 45
    env:
      PGLITE_WASM_MODE: node
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      # The personal-assistant barrel imports sibling plugin dists (e.g.
      # plugin-calendly pulls "@elizaos/core/node") straight from
      # node_modules, so the lane needs the package's workspace dependency
      # graph built. Turbo replays warm runs from cache.
      - name: Build personal-assistant dependency graph
        run: node packages/scripts/run-turbo.mjs run build --filter='@elizaos/plugin-personal-assistant...'

      - name: Run personal-assistant integration lanes
        timeout-minutes: 35
        run: bun run --cwd plugins/plugin-personal-assistant test:integration

