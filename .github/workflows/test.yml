  zero-key-e2e:
    name: Zero-Key Deterministic E2E
    needs:
      - changes
      - zero-key-unit-coverage
      - zero-key-browser
      - zero-key-diagnostics
      - zero-key-scenario-runner
      - zero-key-harness-e2e
    if: always() && (github.event_name != 'pull_request' || needs.changes.outputs.zero_key == 'true')
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    steps:
      - name: Check zero-key slices
        shell: bash
        run: |
          set -u
          bad=0
          for pair in \
            "zero-key-unit-coverage:${{ needs.zero-key-unit-coverage.result }}" \
            "zero-key-browser:${{ needs.zero-key-browser.result }}" \
            "zero-key-diagnostics:${{ needs.zero-key-diagnostics.result }}" \
            "zero-key-scenario-runner:${{ needs.zero-key-scenario-runner.result }}" \
            "zero-key-harness-e2e:${{ needs.zero-key-harness-e2e.result }}"; do
            name="${pair%%:*}"
            result="${pair##*:}"
            echo "$name: $result"
            if [ "$result" != "success" ]; then
              echo "::error title=Tests zero-key::$name finished with $result"
              bad=1
            fi
          done
          if [ "$bad" -ne 0 ]; then
            exit 1
          fi
          echo "All zero-key slices passed."

  cloud-live-e2e:
    name: Cloud Live E2E (Eliza Cloud)
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.cloud == 'true'
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 60
    outputs:
      skip: ${{ steps.cloud.outputs.skip }}
      capability_skip: ${{ steps.cloud.outputs.capability_skip }}
    steps:
      - name: Check cloud secrets
        id: cloud
        env:
          EVENT_NAME: ${{ github.event_name }}
          ELIZAOS_CLOUD_API_KEY: ${{ secrets.ELIZAOS_CLOUD_API_KEY != '' && secrets.ELIZAOS_CLOUD_API_KEY || secrets.ELIZACLOUD_API_KEY }}
          ELIZA_REMOTE_CAPABILITY_CLOUD_LIVE_ENABLED: ${{ vars.ELIZA_REMOTE_CAPABILITY_CLOUD_LIVE_ENABLED != '' && vars.ELIZA_REMOTE_CAPABILITY_CLOUD_LIVE_ENABLED || secrets.ELIZA_REMOTE_CAPABILITY_CLOUD_LIVE_ENABLED }}
        run: |
          strict_context=false
          case "${EVENT_NAME}" in
            workflow_dispatch|schedule) strict_context=true ;;
          esac

          if [ -z "${ELIZAOS_CLOUD_API_KEY}" ]; then
            message="No Eliza Cloud API key configured"
            if [ "${strict_context}" = "true" ]; then
              echo "::error::${message}; strict ${EVENT_NAME} live lanes must fail instead of greening by skip."
              exit 1
            fi
            echo "::warning::${message} - skipping optional cloud live E2E for ${EVENT_NAME}."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "capability_skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "${ELIZA_REMOTE_CAPABILITY_CLOUD_LIVE_ENABLED}" = "1" ]; then
            echo "capability_skip=false" >> "$GITHUB_OUTPUT"
          else
            if [ "${EVENT_NAME}" = "workflow_dispatch" ] || [ "${EVENT_NAME}" = "schedule" ]; then
              echo "::error::Remote capability cloud sandbox live smoke is required for ${EVENT_NAME}; set ELIZA_REMOTE_CAPABILITY_CLOUD_LIVE_ENABLED=1 instead of producing a green skip."
              exit 1
            fi
            echo "::notice::Remote capability cloud sandbox live smoke skipped because ELIZA_REMOTE_CAPABILITY_CLOUD_LIVE_ENABLED is not configured."
            echo "capability_skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.cloud.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Node.js
        if: steps.cloud.outputs.skip != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        if: steps.cloud.outputs.skip != 'true'
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Run Cloud tests
        if: steps.cloud.outputs.skip != 'true'
        shell: bash
        run: |
          set -o pipefail
          log_file="$(mktemp)"

          if bun run --cwd packages/cloud/sdk test:e2e 2>&1 | tee "$log_file"; then
            exit 0
          fi

          # Soft-fail ONLY on genuine provider-side unavailability (HTTP 429/5xx, quota
          # exhaustion, or network errors) that a contributor can't control. Client-side
          # failures must redden the job so real regressions aren't masked: 4xx auth/permission
          # (e.g. 403 access_denied / "missing required permission"), assertion failures and
          # timeouts all fall through to exit 1. Patterns are anchored to HTTP status codes and
          # error tokens so they can't collide with a benign test title (the old allowlist
          # matched "credit balance" from the test name "gets credit balance and summary",
          # swallowing every failure on every run).
          if grep -Eiq '(status code|statusCode|HTTP)[: ]*429|too many requests|rate.?limit|(status code|statusCode|HTTP)[: ]*5[0-9][0-9]|service unavailable|internal server error|temporarily unavailable|overloaded|exceeded your current quota|quota exceeded|insufficient[_ -]?(quota|balance|funds|credits?)|please add credits|top[_ -]?up your credits|ECONNREFUSED|ENOTFOUND|ETIMEDOUT|ECONNRESET|socket hang up' "$log_file"; then
            echo "::warning::Cloud Live E2E soft-failed: external provider unavailable (HTTP 429/5xx, quota, or network error). Genuine test failures are NOT suppressed."
            exit 0
          fi

          exit 1
        env:
          ELIZA_LIVE_TEST: "1"
          ELIZAOS_CLOUD_API_KEY: ${{ secrets.ELIZAOS_CLOUD_API_KEY != '' && secrets.ELIZAOS_CLOUD_API_KEY || secrets.ELIZACLOUD_API_KEY }}
          ELIZA_CLOUD_API_KEY: ${{ secrets.ELIZAOS_CLOUD_API_KEY != '' && secrets.ELIZAOS_CLOUD_API_KEY || secrets.ELIZACLOUD_API_KEY }}
          ELIZAOS_CLOUD_BASE_URL: ${{ secrets.ELIZAOS_CLOUD_BASE_URL }}
          ELIZA_CLOUD_BASE_URL: ${{ secrets.ELIZAOS_CLOUD_BASE_URL }}
          ELIZA_CLOUD_API_BASE_URL: ${{ secrets.ELIZAOS_CLOUD_API_BASE_URL }}

      - name: Prepare remote capability cloud live report directory
        if: steps.cloud.outputs.capability_skip != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
        run: |
          node packages/scripts/rm-path-recursive.mjs reports/remote-capabilities/cloud
          mkdir -p reports/remote-capabilities/cloud

      - name: Remote capability cloud sandbox live smoke
        if: steps.cloud.outputs.capability_skip != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
        run: bun run --cwd packages/agent test:remote-capabilities:cloud-live
        env:
          ELIZA_LIVE_TEST: "1"
          ELIZA_REMOTE_CAPABILITY_LIVE_REPORT_DIR: reports/remote-capabilities/cloud
          ELIZAOS_CLOUD_API_KEY: ${{ secrets.ELIZAOS_CLOUD_API_KEY != '' && secrets.ELIZAOS_CLOUD_API_KEY || secrets.ELIZACLOUD_API_KEY }}
          ELIZAOS_CLOUD_BASE_URL: ${{ secrets.ELIZAOS_CLOUD_BASE_URL }}
          ELIZA_CLOUD_BASE_URL: ${{ secrets.ELIZAOS_CLOUD_BASE_URL }}

      - name: Validate remote capability cloud live report
        if: steps.cloud.outputs.capability_skip != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
        run: bun run test:remote-capabilities:validate-live-reports --kind cloud --expect-count 1 --max-age-minutes 90 --max-future-minutes 5 --require-ci --require-file-identity --match-github-env reports/remote-capabilities/cloud

      - name: Upload remote capability cloud live report
        if: steps.cloud.outputs.capability_skip != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: remote-capability-cloud-live-report
          path: reports/remote-capabilities/cloud/*.json
          if-no-files-found: error
          retention-days: 7

      - name: Prune remote capability cloud report
        if: always() && steps.cloud.outputs.capability_skip != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
        run: node packages/scripts/rm-path-recursive.mjs reports/remote-capabilities/cloud

      - name: Note remote capability cloud live smoke not observed
        if: steps.cloud.outputs.skip != 'true' && github.event_name != 'workflow_dispatch' && github.event_name != 'schedule'
        run: |
          echo "::notice::Remote capability cloud sandbox live smoke is only observed on workflow_dispatch or schedule events."
          {
            echo "### Remote capability cloud live smoke"
            echo ""
            echo "Not observed for event \`${{ github.event_name }}\`. The full-surface cloud sandbox smoke runs only on \`workflow_dispatch\` and \`schedule\`."
          } >> "$GITHUB_STEP_SUMMARY"

  provider-live-e2e:
    name: Remote Capability Provider Live E2E
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 45
    outputs:
      skip: ${{ steps.providers.outputs.skip }}
    steps:
      - name: Check provider endpoint secrets
        id: providers
        env:
          EVENT_NAME: ${{ github.event_name }}
          E2B_URL: ${{ secrets.ELIZA_REMOTE_CAPABILITY_E2B_URL }}
          HOME_URL: ${{ secrets.ELIZA_REMOTE_CAPABILITY_HOME_MACHINE_URL }}
          MOBILE_URL: ${{ secrets.ELIZA_REMOTE_CAPABILITY_MOBILE_COMPANION_URL }}
          DESKTOP_URL: ${{ secrets.ELIZA_REMOTE_CAPABILITY_DESKTOP_COMPANION_URL }}
        run: |
          strict_context=false
          case "${EVENT_NAME}" in
            workflow_dispatch|schedule) strict_context=true ;;
          esac

          if [ -z "${E2B_URL}${HOME_URL}${MOBILE_URL}${DESKTOP_URL}" ]; then
            message="No remote capability provider endpoints configured"
            if [ "${strict_context}" = "true" ]; then
              echo "::error::${message}; strict ${EVENT_NAME} live lanes must fail instead of greening by skip."
              exit 1
            fi
            echo "::warning::${message} - skipping optional provider live E2E."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          missing_required=()
          if [ -z "${E2B_URL}" ]; then
            missing_required+=("ELIZA_REMOTE_CAPABILITY_E2B_URL")
          fi
          if [ -z "${HOME_URL}" ]; then
            missing_required+=("ELIZA_REMOTE_CAPABILITY_HOME_MACHINE_URL")
          fi
          if [ -z "${MOBILE_URL}" ]; then
            missing_required+=("ELIZA_REMOTE_CAPABILITY_MOBILE_COMPANION_URL")
          fi

          if [ "${#missing_required[@]}" -gt 0 ]; then
            message="Missing required remote capability provider endpoint secrets: ${missing_required[*]}"
            if [ "${strict_context}" = "true" ]; then
              echo "::error::${message}; strict ${EVENT_NAME} live lanes must fail instead of greening by skip."
              exit 1
            fi
            echo "::warning::${message}. Skipping optional provider live E2E for ${EVENT_NAME}."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.providers.outputs.skip != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Node.js
        if: steps.providers.outputs.skip != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        if: steps.providers.outputs.skip != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Prepare remote capability provider live report directory
        if: steps.providers.outputs.skip != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
        run: |
          node packages/scripts/rm-path-recursive.mjs reports/remote-capabilities/providers
          mkdir -p reports/remote-capabilities/providers

      - name: Remote capability URL-backed provider live smoke
        if: steps.providers.outputs.skip != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
        run: bun run --cwd packages/agent test:remote-capabilities:provider-live
        env:
          ELIZA_LIVE_TEST: "1"
          ELIZA_REMOTE_CAPABILITY_LIVE_REPORT_DIR: reports/remote-capabilities/providers
          ELIZA_REMOTE_CAPABILITY_E2B_URL: ${{ secrets.ELIZA_REMOTE_CAPABILITY_E2B_URL }}
          ELIZA_REMOTE_CAPABILITY_E2B_TOKEN: ${{ secrets.ELIZA_REMOTE_CAPABILITY_E2B_TOKEN }}
          ELIZA_REMOTE_CAPABILITY_E2B_ENDPOINT_ID: ${{ secrets.ELIZA_REMOTE_CAPABILITY_E2B_ENDPOINT_ID }}
          ELIZA_REMOTE_CAPABILITY_E2B_MODULES: ${{ secrets.ELIZA_REMOTE_CAPABILITY_E2B_MODULES }}
          ELIZA_REMOTE_CAPABILITY_HOME_MACHINE_URL: ${{ secrets.ELIZA_REMOTE_CAPABILITY_HOME_MACHINE_URL }}
          ELIZA_REMOTE_CAPABILITY_HOME_MACHINE_TOKEN: ${{ secrets.ELIZA_REMOTE_CAPABILITY_HOME_MACHINE_TOKEN }}
          ELIZA_REMOTE_CAPABILITY_HOME_MACHINE_ENDPOINT_ID: ${{ secrets.ELIZA_REMOTE_CAPABILITY_HOME_MACHINE_ENDPOINT_ID }}
          ELIZA_REMOTE_CAPABILITY_HOME_MACHINE_MODULES: ${{ secrets.ELIZA_REMOTE_CAPABILITY_HOME_MACHINE_MODULES }}
          ELIZA_REMOTE_CAPABILITY_MOBILE_COMPANION_URL: ${{ secrets.ELIZA_REMOTE_CAPABILITY_MOBILE_COMPANION_URL }}
          ELIZA_REMOTE_CAPABILITY_MOBILE_COMPANION_TOKEN: ${{ secrets.ELIZA_REMOTE_CAPABILITY_MOBILE_COMPANION_TOKEN }}
          ELIZA_REMOTE_CAPABILITY_MOBILE_COMPANION_ENDPOINT_ID: ${{ secrets.ELIZA_REMOTE_CAPABILITY_MOBILE_COMPANION_ENDPOINT_ID }}
          ELIZA_REMOTE_CAPABILITY_MOBILE_COMPANION_MODULES: ${{ secrets.ELIZA_REMOTE_CAPABILITY_MOBILE_COMPANION_MODULES }}
          ELIZA_REMOTE_CAPABILITY_DESKTOP_COMPANION_URL: ${{ secrets.ELIZA_REMOTE_CAPABILITY_DESKTOP_COMPANION_URL }}
          ELIZA_REMOTE_CAPABILITY_DESKTOP_COMPANION_TOKEN: ${{ secrets.ELIZA_REMOTE_CAPABILITY_DESKTOP_COMPANION_TOKEN }}
          ELIZA_REMOTE_CAPABILITY_DESKTOP_COMPANION_ENDPOINT_ID: ${{ secrets.ELIZA_REMOTE_CAPABILITY_DESKTOP_COMPANION_ENDPOINT_ID }}
          ELIZA_REMOTE_CAPABILITY_DESKTOP_COMPANION_MODULES: ${{ secrets.ELIZA_REMOTE_CAPABILITY_DESKTOP_COMPANION_MODULES }}

      - name: Validate remote capability provider live reports
        if: steps.providers.outputs.skip != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
        run: bun run test:remote-capabilities:validate-live-reports --kind provider --expect-count 3..4 --max-age-minutes 90 --max-future-minutes 5 --allowed-providers e2b,home-machine,mobile-companion,desktop-companion --require-providers e2b,home-machine,mobile-companion --require-ci --require-file-identity --match-github-env reports/remote-capabilities/providers

      - name: Upload remote capability provider live report
        if: steps.providers.outputs.skip != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: remote-capability-provider-live-report
          path: reports/remote-capabilities/providers/*.json
          if-no-files-found: error
          retention-days: 7

      - name: Prune remote capability provider reports
        if: always() && steps.providers.outputs.skip != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
        run: node packages/scripts/rm-path-recursive.mjs reports/remote-capabilities/providers

      - name: Note provider live smoke not observed
        if: steps.providers.outputs.skip != 'true' && github.event_name != 'workflow_dispatch' && github.event_name != 'schedule'
        run: |
          echo "::notice::Remote capability provider live smoke is only observed on workflow_dispatch or schedule events."
          {
            echo "### Remote capability provider live smoke"
            echo ""
            echo "Endpoint secrets are configured, but the full-surface provider live smoke was not observed for event \`${{ github.event_name }}\`. It runs only on \`workflow_dispatch\` and \`schedule\`."
          } >> "$GITHUB_STEP_SUMMARY"

  github-live-artifact-validate:
    name: Remote Capability GitHub Live Artifact Validator
    needs:
      - cloud-live-e2e
      - provider-live-e2e
    if: always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && (needs.cloud-live-e2e.outputs.capability_skip != 'true' || needs.provider-live-e2e.outputs.skip != 'true')
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Download cloud + provider live report artifacts
        run: |
          mkdir -p reports/remote-capabilities/cloud reports/remote-capabilities/providers
          gh run download "$GITHUB_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name remote-capability-cloud-live-report \
            --dir reports/remote-capabilities/cloud || echo "::notice::remote-capability-cloud-live-report artifact not present"
          gh run download "$GITHUB_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name remote-capability-provider-live-report \
            --dir reports/remote-capabilities/providers || echo "::notice::remote-capability-provider-live-report artifact not present"

      - name: Re-validate cloud live report from downloaded artifact
        if: needs.cloud-live-e2e.result == 'success' && needs.cloud-live-e2e.outputs.capability_skip != 'true'
        run: bun run test:remote-capabilities:validate-live-reports --kind cloud --expect-count 1 --max-age-minutes 120 --max-future-minutes 5 --require-ci --require-file-identity reports/remote-capabilities/cloud

      - name: Re-validate provider live reports from downloaded artifacts
        if: needs.provider-live-e2e.result == 'success' && needs.provider-live-e2e.outputs.skip != 'true'
        run: bun run test:remote-capabilities:validate-live-reports --kind provider --expect-count 3..4 --max-age-minutes 120 --max-future-minutes 5 --allowed-providers e2b,home-machine,mobile-companion,desktop-companion --require-providers e2b,home-machine,mobile-companion --require-ci --require-file-identity reports/remote-capabilities/providers

  # The merge queue's sole required context is `ci-ok`, and until now `ci-ok`
  # needed only the test lanes — so a change that breaks repo-wide typecheck,
  # fails biome lint, is unformatted, or commits a secret could still merge to
  # develop as long as tests passed (all of these are required on `main` but were
  # advisory on develop; #13617 F2). This job restores parity: it runs the same
  # lint / format / typecheck / secret-scan gates that guard `main`, and `ci-ok`
  # needs it. It runs anywhere `ci-ok` treats skipped jobs as failures (merge
  # queue, develop push, manual dispatch, and nightly schedule); on PRs
  # quality.yml already covers this surface, so the job self-skips and `ci-ok`'s
  # lenient PR path lets the skip pass. Runner: fleet-aware like the test lanes —
  # it was pinned to GitHub-hosted for independence from the self-hosted fleet,
  # but with hosted runners billing-frozen (#13481) that pin froze this ci-ok
  # dependency; route to self-hosted while the fleet is online.
  merge-quality-gate:
    name: Merge Queue Quality Gate
    needs: changes
    if: >-
      github.event_name == 'merge_group' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Repo-wide biome lint
        run: bun run lint

      - name: Repo-wide biome format check
        run: bun run format:check

      - name: Repo-wide typecheck
        run: bun run typecheck

      - name: Stale base guard
        env:
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "${CURRENT_SHA}^" >/dev/null 2>&1; then
            BASE_SHA="$(git rev-parse "${CURRENT_SHA}^1")"
            node packages/scripts/stale-base-guard.self-test.mjs
            node packages/scripts/stale-base-guard.mjs \
              --base "$BASE_SHA" \
              --head "$CURRENT_SHA" \
              --merge-base "$BASE_SHA" \
              --window 1200 \
              --max-behind-commits 200 \
              --max-behind-hours 72 \
              --github \
              --summary "$GITHUB_STEP_SUMMARY"
          else
            echo "::notice::Current SHA has no parent; stale-base guard has no target branch parent to compare."
          fi

      - name: Install gitleaks (OSS binary — no license required)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.30.1
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 /tmp/gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/gitleaks" version

      - name: Secret scan (gitleaks)
        env:
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Scan the queue/tip commit only. New content is what the merge
          # introduces; a full-history re-scan re-flags long-known vendored
          # artifacts (see gitleaks.yml for the same rationale). Merge queue
          # SHAs are merge commits, and `git log -p -1 <merge>` emits no patch
          # by default, so use `-m -p` whenever the tip has multiple parents.
          parent_count="$(git rev-list --parents -n 1 "$CURRENT_SHA" | wc -w | tr -d ' ')"
          if [ "$parent_count" -gt 2 ]; then
            RANGE_ARGS=(--log-opts "-m -p -1 ${CURRENT_SHA}")
          elif [ "$parent_count" -eq 2 ]; then
            RANGE_ARGS=(--log-opts "-1 ${CURRENT_SHA}")
          else
            echo "gitleaks: tip ${CURRENT_SHA} is an orphan/root baseline commit (no parent);"
            echo "its content was already scanned incrementally on develop. Skipping full-tree re-scan."
            exit 0
          fi
          gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --verbose \
            --redact \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --no-banner \
            "${RANGE_ARGS[@]}"

  ci-ok:
    name: ci-ok
    if: ${{ !cancelled() && always() }}
    needs:
      - stale-base-preflight
      - changes
      - test-runner-vacuous-green-guard
      - merge-quality-gate
      - server-tests
      - client-tests
      - xr-harness-e2e
      - plugin-tests-status
      - integration-tests
      - desktop-contract
      - zero-key-e2e
      - cloud-live-e2e
      - provider-live-e2e
      - github-live-artifact-validate
    # Fleet-aware (see `changes`): the aggregate gate itself must run to report a
    # conclusion — a hardcoded hosted pin froze `ci-ok` on the billing-frozen
    # fleet (#13481), so the required check never posted and nothing could merge.
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 10
    steps:
      - name: Check test results
        shell: bash
        run: |
          set -u
          echo "=== Required test job results ==="
          echo "stale-base-preflight:${{ needs.stale-base-preflight.result }}"
          echo "changes:          ${{ needs.changes.result }}"
          echo "runner guard:     ${{ needs.test-runner-vacuous-green-guard.result }}"
          echo "merge-quality-gate:${{ needs.merge-quality-gate.result }}"
          echo "server-tests:     ${{ needs.server-tests.result }}"
          echo "client-tests:     ${{ needs.client-tests.result }}"
          echo "xr-harness-e2e:   ${{ needs.xr-harness-e2e.result }}"
          echo "plugin-tests:     ${{ needs.plugin-tests-status.result }}"
          echo "integration-tests:${{ needs.integration-tests.result }}"
          echo "desktop-contract: ${{ needs.desktop-contract.result }}"
          echo "zero-key-e2e:     ${{ needs.zero-key-e2e.result }}"
          echo "cloud-live-e2e:   ${{ needs.cloud-live-e2e.result }}"
          echo "provider-live-e2e:${{ needs.provider-live-e2e.result }}"
          echo "github-live-artifact-validate:${{ needs.github-live-artifact-validate.result }}"
          echo "==================================="
          strict_results="${{ github.event_name == 'push' || github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}"
          bad=0
          for pair in \
            "stale-base-preflight:${{ needs.stale-base-preflight.result }}" \
            "changes:${{ needs.changes.result }}" \
            "test-runner-vacuous-green-guard:${{ needs.test-runner-vacuous-green-guard.result }}" \
            "merge-quality-gate:${{ needs.merge-quality-gate.result }}" \
            "server-tests:${{ needs.server-tests.result }}" \
            "client-tests:${{ needs.client-tests.result }}" \
            "xr-harness-e2e:${{ needs.xr-harness-e2e.result }}" \
            "plugin-tests:${{ needs.plugin-tests-status.result }}" \
            "integration-tests:${{ needs.integration-tests.result }}" \
            "desktop-contract:${{ needs.desktop-contract.result }}" \
            "zero-key-e2e:${{ needs.zero-key-e2e.result }}" \
            "cloud-live-e2e:${{ needs.cloud-live-e2e.result }}" \
            "provider-live-e2e:${{ needs.provider-live-e2e.result }}" \
            "github-live-artifact-validate:${{ needs.github-live-artifact-validate.result }}"; do
            name="${pair%%:*}"
            result="${pair##*:}"
            if [ "$name" = "stale-base-preflight" ] && [ "$result" = "skipped" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
              echo "::notice title=Test gate::PR stale-base preflight is skipped for ${{ github.event_name }}; merge-quality-gate runs the strict stale-base guard for this event."
              continue
            fi
            if [ "$name" = "github-live-artifact-validate" ] && [ "$result" = "skipped" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "${{ github.event_name }}" != "schedule" ]; then
              echo "::notice title=Test gate::Live artifact validation is observed only on workflow_dispatch/schedule, so its skip is allowed for ${{ github.event_name }}."
              continue
            fi
            if [ "$name" = "github-live-artifact-validate" ] && [ "$result" = "skipped" ] && [ "${{ needs.cloud-live-e2e.outputs.capability_skip }}" = "true" ] && [ "${{ needs.provider-live-e2e.outputs.skip }}" = "true" ]; then
              echo "::notice title=Test gate::Live artifact validation skipped because no live report producers were configured."
              continue
            fi
            if [ "$result" = "skipped" ] && [ "$strict_results" != "true" ]; then
              echo "::notice title=Test gate::Path-gated job '${name}' was skipped for this PR context."
              continue
            fi
            if [ "$result" != "success" ]; then
              echo "::error title=Test gate::Required job '${name}' finished with '${result}' (expected success)"
              bad=1
            fi
          done
          if [ "$bad" -ne 0 ]; then
            exit 1
          fi
          echo "All required test jobs passed. Required develop ruleset check: ci-ok."
