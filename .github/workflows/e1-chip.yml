name: e1-chip

on:
  push:
    branches: [develop, main]
    paths:
      - "packages/research/chip/**"
      - ".github/workflows/e1-chip.yml"
  pull_request:
    paths:
      - "packages/research/chip/**"
      - ".github/workflows/e1-chip.yml"

concurrency:
  group: e1-chip-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default to least privilege. Override per-job where needed.
permissions:
  contents: read

jobs:
  docker-regression:
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    defaults:
      run:
        working-directory: packages/research/chip
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Preflight — AlphaChip checkpoint-blocker attestation freshness
        # `make clean ci-fast` (the regression step below) runs docs-check ->
        # ai-eda-alphachip-checkpoint-blocker-check, a MONTHLY attestation that
        # the AlphaChip TPU checkpoint is still 403-blocked / closed-source. The
        # check fails when docs/toolchain/alphachip-checkpoint-blocker.md +
        # external/circuit_training/pin-manifest.json ("Last audited" /
        # last_audited) are not in the current month. On a month rollover it
        # therefore fails DEEP inside the run — after ~10 min of building the
        # Verilator/yosys tool image — with an opaque `make: Error 1`.
        #
        # The check is pure Python (pyyaml only) and needs no built toolchain, so
        # run it on the host FIRST. A stale attestation fails here in seconds with
        # the exact actionable message instead of burning the toolchain build.
        # This is a fail-fast surface for a deliberate human re-attestation gate;
        # it does not weaken or auto-satisfy the gate.
        run: |
          python3 -m pip install --quiet pyyaml
          python3 scripts/ai_eda/check_alphachip_checkpoint_blocker.py --run-id "preflight-${GITHUB_RUN_ID}"

      - name: Build tool image
        run: docker build -t eliza-soc-tools .

      - name: Run full lint and type checks
        run: docker run --rm -v "$PWD:/work" -w /work eliza-soc-tools make lint typecheck

      - name: Run e1-chip regression
        run: docker run --rm -v "$PWD:/work" -w /work eliza-soc-tools make clean ci-fast

      - name: Run evidence boundary regression
        run: docker run --rm -v "$PWD:/work" -w /work eliza-soc-tools make evidence-regression-test

      - name: Check generated pipeline artifacts
        run: |
          docker run --rm -v "$PWD:/work" -w /work eliza-soc-tools make tool-versions
          docker run --rm -v "$PWD:/work" -w /work eliza-soc-tools python3 scripts/pipeline_check.py

      - name: Record release-gate tool manifest
        if: always()
        continue-on-error: true
        run: docker run --rm -v "$PWD:/work" -w /work eliza-soc-tools make record-tool-versions

      - name: Emit mvp-status JSON
        if: always()
        continue-on-error: true
        run: docker run --rm -v "$PWD:/work" -w /work eliza-soc-tools make mvp-status-json

      - name: Show release evidence gate command
        run: |
          echo "Release evidence gate is separate from scaffold CI: make ci-release-evidence"

      - name: Fix permissions on docker-written reports
        if: always()
        continue-on-error: true
        run: sudo chown -R "$(id -u):$(id -g)" build verify 2>/dev/null || true; sudo chmod -R a+rX build verify || true

      - name: Upload regression artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        continue-on-error: true
        with:
          name: e1-chip-regression
          path: |
            packages/research/chip/build/reports
            packages/research/chip/build/netlist
            packages/research/chip/verify/cocotb/results.xml
            packages/research/chip/verify/cocotb/results/*.xml
            packages/research/chip/build/reports/cocotb
            packages/research/chip/build/reports/formal_manifest.json
            packages/research/chip/verify/formal/*/status
            packages/research/chip/verify/formal/*/logfile.txt
          if-no-files-found: warn
          retention-days: 7
