# LifeOps/PA real-model benchmark — durable score-history lane (#11789).
#
# This is the "scheduled-lane wiring" residual of #11789: it runs the real-model
# LifeOps/PA benchmark against a live provider and appends the result to the
# committed, append-only series at
# .github/issue-evidence/10721-lifeops-benchmark-history/score-history.jsonl
# so the *trend* — not a single point — stays reviewer-visible over time.
#
# OPT-IN BY DESIGN — merging this file changes nothing until a maintainer:
#   1. Adds a `CEREBRAS_API_KEY` repository secret (the job no-ops without it).
#   2. Uncomments the `schedule:` trigger below to pick a cadence, or runs it
#      on demand via the Actions tab ("Run workflow").
# The run never writes to the repo: it appends to the series in the runner's own
# checkout, prints it to the job summary, and uploads it as a build artifact. A
# maintainer downloads the artifact and commits the new row via a normal PR.

name: lifeops-benchmark-history

on:
  workflow_dispatch:
    inputs:
      harness:
        description: "Which benchmark harness to run"
        type: choice
        default: both
        options: [both, lifeops_bench, lifeops-prompt-benchmark]
      model:
        description: "Cerebras model under test"
        type: string
        default: gemma-4-31b
  # Uncomment to enable a nightly cadence (03:17 UTC). Left disabled so this
  # file is inert on merge until a maintainer opts in.
  # schedule:
  #   - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    # No secret → nothing to run against. Skip cleanly instead of failing red.
    if: ${{ github.repository == 'elizaOS/eliza' }}
    steps:
      - name: Guard on CEREBRAS_API_KEY
        id: guard
        run: |
          if [ -z "${{ secrets.CEREBRAS_API_KEY }}" ]; then
            echo "CEREBRAS_API_KEY not set — nothing to run. Add the repo secret to enable this lane." >> "$GITHUB_STEP_SUMMARY"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.enabled == 'true'

      - uses: oven-sh/setup-bun@v2
        if: steps.guard.outputs.enabled == 'true'
        with:
          bun-version: latest

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.enabled == 'true'
        with:
          python-version: "3.13"

      - name: Install (full node_modules — the TS harness boots the PA runtime)
        if: steps.guard.outputs.enabled == 'true'
        run: bun run install:light

      - name: Install lifeops-bench Python deps (httpx / litellm / pyyaml / dotenv)
        if: >-
          steps.guard.outputs.enabled == 'true' &&
          (github.event_name == 'schedule' || inputs.harness == 'both' || inputs.harness == 'lifeops_bench')
        working-directory: packages/benchmarks/lifeops-bench
        run: pip install -e .

      - name: Run Python lifeops_bench (static, deterministic scoring)
        if: >-
          steps.guard.outputs.enabled == 'true' &&
          (github.event_name == 'schedule' || inputs.harness == 'both' || inputs.harness == 'lifeops_bench')
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        working-directory: packages/benchmarks/lifeops-bench
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/lifeops_bench"
          mkdir -p "$OUT"
          for d in calendar mail messages contacts reminders finance travel health sleep focus; do
            python3 -m eliza_lifeops_bench --agent cerebras-direct --mode static \
              --domain "$d" --limit 12 --concurrency 2 --max-cost-usd 5 \
              --per-scenario-timeout-s 180 --output-dir "$OUT/$d"
          done
          node "$GITHUB_WORKSPACE/.github/issue-evidence/10721-lifeops-benchmark-history/scripts/append-score-history.mjs" \
            --report-dir "$OUT" \
            --harness lifeops_bench --provider cerebras \
            --slice "static, 12/domain x 10 domains" \
            --commit "$GITHUB_SHA" --source "ci-run-${GITHUB_RUN_ID}" \
            --notes "nightly lane ${GITHUB_RUN_ID}"

      - name: Run TS prompt-benchmark (full catalog, live)
        if: >-
          steps.guard.outputs.enabled == 'true' &&
          (github.event_name == 'schedule' || inputs.harness == 'both' || inputs.harness == 'lifeops-prompt-benchmark')
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CEREBRAS_MODEL: ${{ inputs.model || 'gemma-4-31b' }}
          LIFEOPS_PROMPT_BENCHMARK_LIVE: "1"
        run: |
          set -euo pipefail
          bun plugins/plugin-personal-assistant/scripts/lifeops-prompt-benchmark.ts \
            --suite all --provider cerebras \
            --report "$RUNNER_TEMP/prompt-bench.json" \
            --markdown "$RUNNER_TEMP/prompt-bench.md" \
            --ax "$RUNNER_TEMP/prompt-bench.jsonl" || true
          node .github/issue-evidence/10721-lifeops-benchmark-history/scripts/append-score-history.mjs \
            --report "$RUNNER_TEMP/prompt-bench.json" \
            --harness lifeops-prompt-benchmark --provider cerebras \
            --model "${CEREBRAS_MODEL}" --slice "full catalog (398 cases, all variants)" \
            --commit "$GITHUB_SHA" --source "ci-run-${GITHUB_RUN_ID}" \
            --notes "nightly lane ${GITHUB_RUN_ID}"

      - name: Show appended series
        if: steps.guard.outputs.enabled == 'true'
        run: |
          {
            echo '## LifeOps/PA benchmark — appended score history'
            echo '```'
            cat .github/issue-evidence/10721-lifeops-benchmark-history/HISTORY.md
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload score-history artifact
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lifeops-score-history-${{ github.run_id }}
          path: |
            .github/issue-evidence/10721-lifeops-benchmark-history/score-history.jsonl
            .github/issue-evidence/10721-lifeops-benchmark-history/HISTORY.md
