name: Terraform — Control Plane (Hetzner)

# Plan/apply the Eliza Cloud control-plane IaC
# (packages/cloud/infra/cloud/terraform/hetzner/control-plane).
#
#   pull_request touching the module -> fmt + validate (NO cloud creds, no state — safe)
#   workflow_dispatch (manual)        -> terraform plan or apply against an
#                                        environment (staging | production)
#
# Apply provisions a real billed Hetzner control-plane VM (the box that runs
# eliza-provisioning-worker, agent-router, headscale, and cloudflared). It is
# an explicit operator action — it never auto-runs.
# "develop = staging" is expressed by choosing environment=staging on dispatch.
#
# Secrets:
#   environment-scoped (set on each `staging` / `production` GitHub Environment):
#     HCLOUD_TOKEN                  Hetzner Cloud API token for that env's project
#   repo-level (already present in this repo):
#     CLOUDFLARE_API_TOKEN          Cloudflare DNS token (control-plane A record)
#     R2_STATE_ACCESS_KEY_ID        R2 token -> AWS_ACCESS_KEY_ID (tf state backend)
#     R2_STATE_SECRET_ACCESS_KEY    R2 token -> AWS_SECRET_ACCESS_KEY (tf state backend)
# Variables (environment-scoped — shared with apps-data-plane workflow):
#   APPS_CLOUDFLARE_ZONE_ID         Cloudflare zone id for elizacloud.ai (one zone)
#   APPS_OPERATOR_SSH_KEY           operator SSH public key allowed onto the VM
#   DEPLOY_BRANCH (optional)        Branch the host's auto-deploy follows.
#                                        Defaults to `develop` (staging) /
#                                        REQUIRED to be `main` for production
#                                        per the module's validation.

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/cloud/infra/cloud/terraform/hetzner/control-plane/**"
      - ".github/workflows/terraform-control-plane.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to target
        type: choice
        default: staging
        options: [staging, production]
      action:
        description: terraform action
        type: choice
        default: plan
        options: [plan, apply]
      replace:
        description: |
          Optional. Comma-separated TF resource addresses to force-replace on
          this apply (e.g. `hcloud_server.control_plane["1"]`). Threaded as
          `-replace=<addr>` flags. Leave empty for a normal apply. No effect
          on `plan`.
        type: string
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: write

# Serialize plan/apply per env across branches so two operators can't apply
# the same env concurrently. PR validation stays parallel (different group).
concurrency:
  group: terraform-control-plane-${{ github.event.inputs.environment || format('pr-{0}', github.ref) }}
  # #14051 Tier B: PR runs are fmt+validate only (no creds, no state) — safe to
  # cancel a superseded PR run on the next push. workflow_dispatch (plan/apply
  # against real state) groups by environment and is NEVER cancelled, so an
  # in-flight apply cannot be interrupted.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TF_DIR: packages/cloud/infra/cloud/terraform/hetzner/control-plane
  # 1.10.5 — needed for S3 backend `use_lockfile = true` (R2 has no DynamoDB
  # equivalent, this is how we serialize state writes). Bumping below 1.10
  # silently reintroduces the parallel-apply race.
  TF_VERSION: "1.10.5"

jobs:
  # PR validation: format + validate only. No cloud credentials, no remote state,
  # so it runs safely on every PR (incl. before the env HCLOUD_TOKEN exists).
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: terraform fmt -check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive
      - name: terraform validate (no backend)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -backend=false -input=false
          terraform validate -no-color

  # Manual plan/apply against a real environment. The `environment:` binding makes
  # that env's HCLOUD_TOKEN (and any required reviewers) apply to this run.
  plan-apply:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    environment: ${{ github.event.inputs.environment }}
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # R2 (S3-compatible) state backend creds.
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_STATE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_STATE_SECRET_ACCESS_KEY }}
      # Non-secret inputs threaded as TF_VAR_*. The zone id is accepted as either
      # a secret OR a var (operators have set it both ways) — secret wins if present.
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.APPS_CLOUDFLARE_ZONE_ID || vars.APPS_CLOUDFLARE_ZONE_ID }}
      TF_VAR_ssh_public_keys: '["${{ vars.APPS_OPERATOR_SSH_KEY }}"]'
      # deploy_branch: defaults to 'develop' if unset; module validation forces
      # 'main' when environment=production so prod can't accidentally track dev.
      TF_VAR_deploy_branch: ${{ vars.DEPLOY_BRANCH }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Preflight — required secrets / vars present
        run: |
          env="${{ github.event.inputs.environment }}"
          fail=0
          [ -n "$HCLOUD_TOKEN" ] || { echo "::error::set secrets.HCLOUD_TOKEN on the '$env' environment"; fail=1; }
          [ -n "$AWS_ACCESS_KEY_ID" ] || { echo "::error::missing repo secret R2_STATE_ACCESS_KEY_ID"; fail=1; }
          [ -n "$AWS_SECRET_ACCESS_KEY" ] || { echo "::error::missing repo secret R2_STATE_SECRET_ACCESS_KEY"; fail=1; }
          [ -n "$CLOUDFLARE_API_TOKEN" ] || { echo "::error::missing repo secret CLOUDFLARE_API_TOKEN"; fail=1; }
          [ -n "$TF_VAR_cloudflare_zone_id" ] || { echo "::error::set APPS_CLOUDFLARE_ZONE_ID (secret or var) on the '$env' environment"; fail=1; }
          [ "$TF_VAR_ssh_public_keys" != '[""]' ] || { echo "::error::set vars.APPS_OPERATOR_SSH_KEY on the '$env' environment"; fail=1; }
          exit $fail

      - name: terraform fmt -check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

      - name: terraform init (R2 backend, lockfile readonly)
        working-directory: ${{ env.TF_DIR }}
        # -lockfile=readonly fails the run if the committed .terraform.lock.hcl
        # would need updating (e.g. provider checksum drift). Forces operators
        # to run `terraform init -upgrade` in a PR explicitly.
        run: terraform init -input=false -lockfile=readonly -backend-config="backend-${{ github.event.inputs.environment }}.hcl"

      - name: terraform plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -no-color -input=false

      - name: terraform apply
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_DIR }}
        # `replace` input is a comma-separated list of TF resource addresses
        # to force-replace on this run. Empty -> normal apply.
        #
        # IMPORTANT: the input is threaded via an env var (REPLACE_INPUT), not
        # spliced into the shell with `${{ ... }}`. GitHub Actions substitutes
        # `${{ inputs.foo }}` at YAML-parse time as raw literal text, so any
        # double quotes inside the input (e.g. `hcloud_server.foo["1"]`) end
        # up being parsed by bash as quote delimiters, not as literal
        # characters — the apply silently sees `hcloud_server.foo[1]` instead
        # and TF treats the `[1]` as an int index against a string-keyed
        # for_each map, so 0 changes apply with no error. Reading via $env
        # treats the value as opaque data.
        env:
          REPLACE_INPUT: ${{ github.event.inputs.replace }}
        run: |
          REPLACE_ARGS=()
          if [ -n "$REPLACE_INPUT" ]; then
            IFS=',' read -ra ADDRS <<< "$REPLACE_INPUT"
            for addr in "${ADDRS[@]}"; do
              # Trim leading/trailing whitespace via bash parameter expansion.
              addr_trimmed="${addr#"${addr%%[![:space:]]*}"}"
              addr_trimmed="${addr_trimmed%"${addr_trimmed##*[![:space:]]}"}"
              [ -n "$addr_trimmed" ] && REPLACE_ARGS+=("-replace=$addr_trimmed")
            done
            echo "::notice::forcing replacement of: ${REPLACE_ARGS[*]}"
          fi
          terraform apply -auto-approve -input=false "${REPLACE_ARGS[@]}"
