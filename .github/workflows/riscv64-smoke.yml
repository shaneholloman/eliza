name: riscv64 cross-build smoke

# Opt-in smoke: builds every riscv64 cross-compiled native artifact and
# exercises each under qemu-riscv64-static. NOT a required check on
# develop PRs — the full build takes ~30-60 min on a standard runner.
#
# Triggers:
#   - workflow_dispatch (manual)
#   - PRs labeled `riscv64`

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]

# cancel superseded in-flight runs for the same PR to free hosted-runner
# capacity. only cancels pull_request runs; push runs on protected branches
# (main/develop) are never cancelled mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'riscv64') }}
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 90
    env:
      ELIZA_RISCV64_SMOKE: "1"
      ZIG_VERSION: "0.14.0"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Install QEMU + base tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-user-static binfmt-support \
            cmake build-essential file binutils python3 jq

      - name: Restore Zig toolchain cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/.cache/elizaos/zig/${{ env.ZIG_VERSION }}
          key: zig-${{ runner.os }}-x86_64-${{ env.ZIG_VERSION }}
          restore-keys: |
            zig-${{ runner.os }}-x86_64-

      - name: Install Zig 0.14
        run: |
          set -euo pipefail
          ZIG_ROOT="$HOME/.cache/elizaos/zig/${ZIG_VERSION}"
          if [ ! -x "${ZIG_ROOT}/zig" ]; then
            node packages/scripts/rm-path-recursive.mjs "${ZIG_ROOT}"
            mkdir -p "${ZIG_ROOT}"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" \
              -o /tmp/zig.tar.xz
            tar -C "${ZIG_ROOT}" --strip-components=1 -xJf /tmp/zig.tar.xz
          fi
          sudo ln -sf "${ZIG_ROOT}/zig" /usr/local/bin/zig
          zig version

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: canary

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      # Fingerprint the riscv64 build inputs from the git index (blob SHAs of
      # tracked native sources + submodule pins). Fast (no byte reads), and it
      # cannot self-pollute because build outputs land in gitignored build/
      # dirs that `git ls-files` never lists.
      - name: Compute riscv64 source fingerprint
        id: riscv64-fp
        run: |
          set -euo pipefail
          {
            git submodule status --recursive
            git ls-files -s \
              packages/native/plugins \
              scripts/build-riscv64-artifacts.sh \
              packages/app-core/scripts/aosp/compile-libllama.mjs
          } | sha256sum | awk '{ print "hash=" $1 }' >> "$GITHUB_OUTPUT"

      # build-riscv64-artifacts.sh is idempotent via existence sentinels, but its
      # outputs never persist across runs. Restore them so an unchanged native
      # source tree replays from the sentinels instead of recompiling every
      # artifact (~30 min). EXACT-MATCH ONLY (no restore-keys): a stale prefix
      # restore would let should_build skip a needed rebuild and smoke a stale
      # artifact — a false green. A source/submodule change busts the key and
      # forces a full rebuild.
      - name: Cache riscv64 build outputs
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            packages/native/plugins/*/build/riscv64
            packages/app-core/platforms/android/app/src/main/assets/agent/riscv64
            ~/.cache/eliza-android-agent/seccomp-shim/riscv64
          key: riscv64-out-${{ runner.os }}-${{ steps.riscv64-fp.outputs.hash }}

      - name: Build every riscv64 artifact (linux only; android skipped)
        run: |
          bun run build:riscv64-artifacts -- --skip-android

      - name: QEMU smoke every riscv64 artifact
        run: |
          bun run check:riscv64-artifacts

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: riscv64-artifacts-report
          path: build/reports/riscv64_artifacts.json
          if-no-files-found: warn
          retention-days: 7

      - name: Print summary
        if: always()
        run: |
          if [ -f build/reports/riscv64_artifacts.json ]; then
            jq '.summary, .final_status' build/reports/riscv64_artifacts.json
          else
            echo "no report produced"
          fi
