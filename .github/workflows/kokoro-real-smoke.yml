name: Kokoro real-weight smoke (Linux)

# The #9588 loader↔GGUF tensor-name drift gate, automated.
#
# Builds the fused `libelizainference` with Kokoro folded in (via the canonical
# `stage-desktop-fused-lib.mjs`, which sets LLAMA_BUILD_KOKORO=ON), stages the
# PUBLISHED Kokoro bundle GGUF + a real voice pack, and runs
# `plugins/plugin-local-inference/scripts/kokoro-real-smoke.ts` against them with
# `KOKORO_SMOKE_REQUIRE=1`. The smoke loads the model, synthesizes a phrase, and
# asserts non-empty 24 kHz PCM whose amplitude envelope looks like speech (the
# #9620 envelope-cv guard that distinguishes real Kokoro from the #9588 noise
# bug). The loader MUST load the SAME GGUF the download path stages — if the
# tensor names drift again, this job goes RED instead of shipping noise.
#
# Opt-in: it builds native code and downloads a ~167 MB model, so it is NOT in
# the default PR fan-out — only workflow_dispatch or a `kokoro-smoke-*` tag runs
# it. To run locally, see the staging steps in
# `plugins/plugin-local-inference/README.md`.
#
# STATUS (2026-07-02) — the #9588 republish LANDED. elizaos/eliza-1
# `bundles/2b/tts/kokoro/kokoro-82m-v1_0.gguf` (162,546,720 B F16, sha256
# 165acd9d2d9b6c2d71fa5bd52b92a2559be08567f58ed496bade076e3d9cb46c) carries the
# 457 post-#9684 tensor names (incl. the previously-missing
# `kokoro.bert.embd_proj.bias`) and is byte-identical to a from-scratch
# `convert_kokoro_pth_to_gguf.py` run on hexgrad/Kokoro-82M at fork pin
# ba598f562. The old `-Q4_K_M` filename 404s and is no longer referenced here.
# The lane stays manual/tag dispatch ONLY for now: on a desktop-CPU runner the
# smoke loads + synthesizes real speech (envelope-cv ≈1.25, WER 0.13 with an
# ASR bundle + the #10726 raw-text G2P fix) but still exceeds the 700 ms mobile
# TTFA budget by orders of magnitude, so an auto-triggered run would paint
# develop RED on perf, not drift. Once the double-G2P fix (#11238 / #10726) is
# merged and the TTFA budget is made per-platform (or first-chunk streaming
# lands), re-enable the path-scoped `push` auto-trigger (loader / converter /
# smoke / this workflow / the llama.cpp submodule pointer) to gate future drift:
#   push:
#     branches: ["**"]
#     paths:
#       - "plugins/plugin-local-inference/native/llama.cpp"
#       - "plugins/plugin-local-inference/native/llama.cpp/tools/kokoro/**"
#       - "plugins/plugin-local-inference/scripts/kokoro-real-smoke.ts"
#       - "plugins/plugin-local-inference/src/services/voice/kokoro/**"
#       - "packages/app-core/scripts/stage-desktop-fused-lib.mjs"
#       - ".github/workflows/kokoro-real-smoke.yml"

on:
  workflow_dispatch: {}
  push:
    tags:
      - "kokoro-smoke-*"

concurrency:
  group: kokoro-real-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  BUN_VERSION: "canary"
  # Published Kokoro bundle — the #9588-fixed F16 republish (2026-07-02).
  # The former `kokoro-82m-v1_0-Q4_K_M.gguf` filename 404s on the repo; the
  # canonical F16 name below is what discovery falls through to and what the
  # download catalog (packages/shared/src/local-inference/catalog.ts) stages.
  KOKORO_HF_REPO: "elizaos/eliza-1"
  KOKORO_GGUF_PATH: "bundles/2b/tts/kokoro/kokoro-82m-v1_0.gguf"
  # Catalog FALLBACK voice (af_bella). af_same (Samantha) is not published yet —
  # discovery falls back to af_bella, which is the voice actually staged on HF.
  KOKORO_VOICE_PATH: "bundles/2b/tts/kokoro/voices/af_bella.bin"

jobs:
  smoke:
    name: ubuntu-22.04 fused-cpu
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 120
    steps:
      - name: Checkout (with llama.cpp submodule)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Linux build deps
        run: |
          set -euo pipefail
          APT_ARGS=(-o Acquire::ForceIPv4=true -o Acquire::Retries=5 -o Acquire::http::Timeout=30)
          for attempt in 1 2 3; do
            if sudo apt-get "${APT_ARGS[@]}" update && \
               sudo apt-get "${APT_ARGS[@]}" install -y --fix-missing \
                 cmake ninja-build build-essential ccache git python3 curl libgomp1 \
                 libespeak-ng-dev espeak-ng-data; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then echo "apt install failed"; exit 1; fi
            sleep $((attempt * 10))
          done
          cmake --version

      - name: Install workspace dependencies
        run: bun install

      - name: Prepare core generated sources
        run: bun run --cwd packages/core prebuild

      - name: Build + stage the fused libelizainference (CPU, Kokoro ON)
        run: |
          set -euo pipefail
          # The canonical fused desktop build: BUILD_SHARED_LIBS=ON +
          # LLAMA_BUILD_OMNIVOICE/MTMD/KOKORO=ON, producing the SHARED
          # `elizainference` target plus its dlopen-able ggml sibling set.
          node packages/app-core/scripts/stage-desktop-fused-lib.mjs \
            --variant cpu --out "$GITHUB_WORKSPACE/fused-lib"
          LIB="$GITHUB_WORKSPACE/fused-lib/libelizainference.so"
          test -f "$LIB" || { echo "missing $LIB after build"; exit 1; }
          # Fail fast with a clear message if the fused lib didn't link Kokoro.
          if ! nm -D "$LIB" | grep -q eliza_inference_kokoro; then
            echo "fused lib does not export the Kokoro ABI (eliza_inference_kokoro_*)"
            exit 1
          fi
          file "$LIB"

      - name: Stage published Kokoro bundle GGUF + voice
        run: |
          set -euo pipefail
          DIR="$GITHUB_WORKSPACE/kokoro-model"
          mkdir -p "$DIR/voices"
          base="https://huggingface.co/${KOKORO_HF_REPO}/resolve/main"
          curl -fSL --retry 5 -o "$DIR/$(basename "$KOKORO_GGUF_PATH")" \
            "$base/${KOKORO_GGUF_PATH}?download=true"
          curl -fSL --retry 5 -o "$DIR/voices/$(basename "$KOKORO_VOICE_PATH")" \
            "$base/${KOKORO_VOICE_PATH}?download=true"
          ls -lh "$DIR" "$DIR/voices"

      - name: Run real-weight Kokoro smoke (require-staged)
        env:
          KOKORO_SMOKE_REQUIRE: "1"
          ELIZA_INFERENCE_LIB_DIR: ${{ github.workspace }}/fused-lib
          LD_LIBRARY_PATH: ${{ github.workspace }}/fused-lib
          ELIZA_KOKORO_MODEL_DIR: ${{ github.workspace }}/kokoro-model
        run: |
          set -euo pipefail
          bun plugins/plugin-local-inference/scripts/kokoro-real-smoke.ts
