name: supply-chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC

# #14051 Tier B: cancel superseded PR runs (SBOM + scan) on rapid pushes.
# Only PRs cancel; push-to-main and the weekly schedule always run to
# completion so the protected-branch supply-chain record is never dropped.
concurrency:
  group: supply-chain-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default to least privilege. Override per-job where needed.
permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom-spdx-json
          path: sbom.spdx.json
          if-no-files-found: error
          retention-days: 7

  vulnerability-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Vulnerability scan (Grype)
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        env:
          GRYPE_DB_VALIDATE_AGE: "false"
        with:
          path: .
          output-format: sarif
          output-file: grype.sarif
          fail-build: false

      - name: Upload vulnerability report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: grype-sarif
          path: grype.sarif
          if-no-files-found: ignore
          retention-days: 7
