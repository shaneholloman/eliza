name: Local Inference Matrix

# Runs the local-inference smoke and ablation variant suite, and gates
# regressions against per-(backend, variant) tok/s floors in
# packages/scripts/local-inference-thresholds.json.
#
# Triggers:
#   - workflow_dispatch (always; needed for macOS/CUDA cost control)
#   - pull_request when source paths under the local-inference subsystem,
#     the fork build script, or the ablation runner change.
#
# Matrix gating:
#   - ubuntu-latest CPU always runs.
#   - ubuntu-latest CUDA only runs when the PR carries the `gpu` label
#     (and a self-hosted GPU runner with the `gpu` runner labels is online).
#   - macos-14 Metal only runs on workflow_dispatch (Apple Silicon cost).
# CUDA and Metal entries are continue-on-error until self-hosted runners
# are wired up so the workflow stays green on CPU only.
#
# Note: Job-level `if:` cannot reference `matrix` (GitHub Actions limitation).
# Optional legs are added by `prepare-matrix` via JSON so only requested
# combinations are scheduled.

on:
  workflow_dispatch:
    inputs:
      run_metal:
        description: "Run macOS-14 Metal job (Apple Silicon)"
        required: false
        type: boolean
        default: true
      run_cuda:
        description: "Run self-hosted CUDA job (requires `gpu` runner)"
        required: false
        type: boolean
        default: false
  pull_request:
    branches: [main]
    paths:
      - "packages/app-core/src/services/local-inference/**"
      - "packages/scripts/local-inference-ablation.mjs"
      - "packages/scripts/local-inference-ablation.config.json"
      - "packages/scripts/local-inference-thresholds.json"
      - "packages/scripts/local-inference-smoke.mjs"
      - ".github/workflows/local-inference-matrix.yml"

concurrency:
  group: local-inference-matrix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "canary"
  NODE_VERSION: "24"
  ELIZA_STATE_DIR: ${{ github.workspace }}/.eliza-state
  # Smoke model: small enough to download and run on a CPU runner in seconds.
  SMOKE_MODEL_REPO: "bartowski/SmolLM2-360M-Instruct-GGUF"
  SMOKE_MODEL_FILE: "SmolLM2-360M-Instruct-Q4_K_M.gguf"

jobs:
  prepare-matrix:
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        id: set
        with:
          script: |
            const ev = context.eventName;
            const pr = context.payload.pull_request;
            const inputs = context.payload.inputs ?? {};

            const hasGpuLabel =
              ev === "pull_request" &&
              Array.isArray(pr?.labels) &&
              pr.labels.some((label) => label?.name === "gpu");

            const runCudaDispatch =
              ev === "workflow_dispatch" &&
              (inputs.run_cuda === true ||
                inputs.run_cuda === "true");

            const runMetalDispatch =
              ev === "workflow_dispatch" &&
              inputs.run_metal !== false &&
              inputs.run_metal !== "false";

            const include = [
              {
                label: "ubuntu-latest cpu",
                "runs-on": "ubuntu-latest",
                backend: "cpu",
                target: "linux-x64-cpu",
                timeout: 90,
                "continue-on-error": false,
              },
            ];

            if (hasGpuLabel || runCudaDispatch) {
              include.push({
                label: "ubuntu-latest cuda (self-hosted)",
                "runs-on": ["self-hosted", "gpu", "cuda"],
                backend: "cuda",
                target: "linux-x64-cuda",
                timeout: 120,
                "continue-on-error": true,
              });
            }

            if (runMetalDispatch) {
              include.push({
                label: "macos-14 metal",
                "runs-on": "macos-14",
                backend: "metal",
                target: "darwin-arm64-metal",
                timeout: 120,
                "continue-on-error": true,
              });
            }

            core.setOutput("matrix", JSON.stringify({ include }));

  matrix:
    name: ${{ matrix.label }}
    needs: prepare-matrix
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: ${{ matrix.timeout }}
    continue-on-error: ${{ matrix.continue-on-error }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Linux build deps
        if: ${{ runner.os == 'Linux' }}
        run: |
          set -euo pipefail
          APT_ARGS=(-o Acquire::ForceIPv4=true -o Acquire::Retries=5 -o Acquire::http::Timeout=30)
          for attempt in 1 2 3; do
            if sudo apt-get "${APT_ARGS[@]}" update && \
               sudo apt-get "${APT_ARGS[@]}" install -y --fix-missing \
                 cmake ninja-build build-essential ccache git python3 python3-pip; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "apt install failed after ${attempt} attempts"
              exit 1
            fi
            sleep $((attempt * 10))
          done
          cmake --version

      - name: Install macOS build deps
        if: ${{ runner.os == 'macOS' }}
        run: |
          set -euo pipefail
          if ! command -v cmake >/dev/null 2>&1; then
            brew install cmake
          fi
          cmake --version

      - name: Install Hugging Face CLI
        run: |
          python3 -m pip install --user --upgrade "huggingface_hub[hf_transfer]"
          if ! command -v hf >/dev/null 2>&1; then
            export PATH="$HOME/.local/bin:$PATH"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
          hf --help >/dev/null

      - name: Cache local-inference state (binaries + models)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ env.ELIZA_STATE_DIR }}/local-inference
          key: local-inference-${{ matrix.target }}-${{ env.SMOKE_MODEL_FILE }}
          restore-keys: |
            local-inference-${{ matrix.target }}-${{ env.SMOKE_MODEL_FILE }}-
            local-inference-${{ matrix.target }}-

      - name: Smoke probe binaries
        run: |
          bun ./packages/scripts/local-inference-smoke.mjs

      - name: Download smoke GGUF (cached)
        run: |
          set -euo pipefail
          MODEL_DIR="${ELIZA_STATE_DIR}/local-inference/models"
          mkdir -p "$MODEL_DIR"
          if [ -f "$MODEL_DIR/${SMOKE_MODEL_FILE}" ]; then
            echo "model already cached: $MODEL_DIR/${SMOKE_MODEL_FILE}"
            ls -lh "$MODEL_DIR/${SMOKE_MODEL_FILE}"
            exit 0
          fi
          hf download "${SMOKE_MODEL_REPO}" "${SMOKE_MODEL_FILE}" \
            --local-dir "$MODEL_DIR"
          ls -lh "$MODEL_DIR/${SMOKE_MODEL_FILE}"

      - name: Run ablation (--quick, gated)
        run: |
          set -euo pipefail
          MODEL_PATH="${ELIZA_STATE_DIR}/local-inference/models/${SMOKE_MODEL_FILE}"
          node ./packages/scripts/local-inference-ablation.mjs \
            --backend ${{ matrix.backend }} \
            --model "$MODEL_PATH" \
            --quick \
            --gate packages/scripts/local-inference-thresholds.json \
            --out-dir artifacts/local-inference-ablation

      - name: Upload ablation artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: local-inference-ablation-${{ matrix.target }}
          path: artifacts/local-inference-ablation/*.json
          if-no-files-found: warn
          retention-days: 30
