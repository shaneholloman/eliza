      BUN_INSTALL_CACHE_DIR: "/cache/bun"
      ELIZA_CERT_QUEUE_DIR: "/queue"
      LANE_COMMAND: "node packages/scripts/run-all-tests.mjs --no-cloud --min-tasks=1"
