    restart: "no"

  lane-live:
    image: ${ELIZA_CERT_IMAGE:-ghcr.io/elizaos/certification-gpu:latest}
    profiles:
      - "cpu"
    command:
      - "bash"
      - "/repo/docker/certification/lane-entry.sh"
    cpuset: "13"
    cpus: 1
    environment:
      BUN_INSTALL_CACHE_DIR: "/cache/bun"
