<!doctype html>
<html lang="en" dir="ltr">

<head>
  <!-- Polyfill for three.js TSL WebGPU enum access.
       Three.js assumes self.GPUShaderStage exists when self is defined,
       but many browsers have self without WebGPU support. -->
  <script>
    if (typeof self !== 'undefined' && !self.GPUShaderStage) {
      self.GPUShaderStage = Object.freeze({ VERTEX: 1, FRAGMENT: 2, COMPUTE: 4 });
    }
    if (typeof self !== 'undefined' && !self.GPUBufferUsage) {
      self.GPUBufferUsage = Object.freeze({
        MAP_READ: 1, MAP_WRITE: 2, COPY_SRC: 4, COPY_DST: 8,
        INDEX: 16, VERTEX: 32, UNIFORM: 64, STORAGE: 128,
        INDIRECT: 256, QUERY_RESOLVE: 512
      });
    }
    if (typeof self !== 'undefined' && !self.GPUTextureUsage) {
      self.GPUTextureUsage = Object.freeze({
        COPY_SRC: 1, COPY_DST: 2, TEXTURE_BINDING: 4,
        STORAGE_BINDING: 8, RENDER_ATTACHMENT: 16
      });
    }
    if (typeof self !== 'undefined' && !self.GPUColorWrite) {
      self.GPUColorWrite = Object.freeze({
        RED: 1, GREEN: 2, BLUE: 4, ALPHA: 8, ALL: 15
      });
    }
    if (typeof self !== 'undefined' && !self.GPUMapMode) {
      self.GPUMapMode = Object.freeze({ READ: 1, WRITE: 2 });
    }
  </script>
  <script>
    (() => {
      if (typeof window === 'undefined' || typeof window.fetch !== 'function') return;
      if (window.__ELIZA_ANDROID_IPC_FETCH_BRIDGE__) return;

      const originalFetch = window.fetch.bind(window);
      const ipcProtocol = 'eliza-local-agent:';
      const ipcHost = 'ipc';
      const ipcBase = 'eliza-local-agent://ipc';
      const ipcPathPrefix = `//${ipcHost}`;
      const localAgentPort = '31337';

      // The loopback (127.0.0.1:31337) → native-IPC rewrite below is only
      // correct on a NATIVE Capacitor platform (iOS/Android), where the
      // in-process local agent has no directly-reachable TCP port and
      // `Agent.request` resolves to a NATIVE plugin. On any non-native host
      // (Electrobun desktop, plain web) there is no native Agent plugin, so
      // `Agent.request` falls back to the web implementation, which fetches
      // `${apiBase}${path}` — the same loopback URL — and re-enters this bridge,
      // recursing forever (renderer OOM). Gate the rewrite on a positive
      // native-platform check so loopback fetches hit the real server directly
      // everywhere else. Capacitor sets window.Capacitor on every platform and
      // this runs at fetch time (after modules load), so the check is reliable.
      function isNativeCapacitorAgentHost() {
        try {
          const cap = window.Capacitor;
          if (!cap || typeof cap.getPlatform !== 'function') return false;
          const p = cap.getPlatform();
          return p === 'ios' || p === 'android';
        } catch (_) {
          return false;
        }
      }

      function rawUrl(input) {
        try {
          return input && typeof input === 'object' && 'url' in input ? input.url : String(input);
        } catch (_) {
          return null;
        }
      }

      function ipcPath(raw) {
        if (!raw) return null;
        const trimmed = String(raw).trim();
        if (!trimmed) return null;
        const lower = trimmed.toLowerCase();
        if (lower === ipcBase) return '/';
        if (lower.indexOf(`${ipcBase}/`) === 0 || lower.indexOf(`${ipcBase}?`) === 0) {
          const suffix = trimmed.slice(ipcBase.length);
          return suffix.charAt(0) === '?' ? `/${suffix}` : suffix || '/';
        }
        try {
          const url = new URL(trimmed, window.location?.href ? window.location.href : 'https://app.elizacloud.ai');
          if (
            isNativeCapacitorAgentHost() &&
            url.protocol === 'http:' &&
            url.port === localAgentPort &&
            (url.hostname === '127.0.0.1' || url.hostname === 'localhost' || url.hostname === '[::1]' || url.hostname === '::1')
          ) {
            return (url.pathname || '/') + url.search;
          }
          if (url.protocol !== ipcProtocol) return null;
          if (url.hostname === ipcHost) return (url.pathname || '/') + url.search;
          if (url.pathname === ipcPathPrefix) return url.search ? `/${url.search}` : '/';
          if (url.pathname.indexOf(`${ipcPathPrefix}/`) === 0) {
            return url.pathname.slice(ipcPathPrefix.length) + url.search;
          }
        } catch (_) {
          return null;
        }
        return null;
      }

      function methodAllowsBody(method) {
        const normalized = String(method || 'GET').toUpperCase();
        return normalized !== 'GET' && normalized !== 'HEAD';
      }

      function headersToRecord(headers) {
        const record = {};
        if (!headers) return record;
        new Headers(headers).forEach((value, key) => {
          record[key] = value;
        });
        return record;
      }

      function unavailable(message) {
        return new Response(JSON.stringify({
          error: 'native_agent_unavailable',
          message: message
        }), {
          status: 503,
          statusText: 'Service Unavailable',
          headers: { 'content-type': 'application/json' }
        });
      }

      function bodyToString(body) {
        if (body === null) return null;
        if (body === undefined) return undefined;
        if (typeof body === 'string') return body;
        if (body instanceof URLSearchParams) return body.toString();
        return undefined;
      }

      async function normalizeInit(input, init) {
        const request = input instanceof Request ? input.clone() : null;
        const method = String(init?.method || request?.method || 'GET').toUpperCase();
        const headers = init?.headers || request?.headers;
        if (!methodAllowsBody(method)) {
          return { method: method, headers: headers };
        }
        if (init && 'body' in init) {
          const explicitBody = bodyToString(init.body);
          if (explicitBody === undefined && init.body != null) return null;
          return { method: method, headers: headers, body: explicitBody || undefined };
        }
        if (!request) return { method: method, headers: headers };
        const requestBody = await request.text();
        return { method: method, headers: headers, body: requestBody || undefined };
      }

      function resolveAgentPlugin() {
        try {
          const cap = window.Capacitor;
          if (!cap) return null;
          const plugins = cap.Plugins || {};
          return plugins.Agent || (typeof cap.registerPlugin === 'function' ? cap.registerPlugin('Agent') : null);
        } catch (_) {
          return null;
        }
      }

      window.fetch = async function elizaAndroidIpcFetchBridge(input, init) {
        const raw = rawUrl(input);
        const path = ipcPath(raw);
        if (path === null) return originalFetch(input, init);

        const normalized = await normalizeInit(input, init);
        if (!normalized) {
          return unavailable('Android local-agent IPC only supports string request bodies');
        }

        const agent = resolveAgentPlugin();
        if (!agent || typeof agent.request !== 'function') {
          return unavailable('Android local-agent IPC is unavailable because the native Agent plugin is not registered');
        }

        const result = await agent.request({
          method: normalized.method,
          path: path,
          headers: headersToRecord(normalized.headers),
          body: methodAllowsBody(normalized.method) ? (normalized.body || null) : null
        });
        // Prefer the lossless base64 of the raw response bytes so binary
        // payloads (e.g. local TTS WAV audio) survive intact; `body` is only a
        // best-effort UTF-8 view that mangles non-text bytes.
        let responseBody = result?.body ? result.body : '';
        if (result && typeof result.bodyBase64 === 'string' && result.bodyBase64.length > 0) {
          const binary = atob(result.bodyBase64);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
          responseBody = bytes;
        }
        return new Response(responseBody, {
          status: result?.status ? result.status : 200,
          statusText: result?.statusText ? result.statusText : '',
          headers: result?.headers ? result.headers : undefined
        });
      };

      window.__ELIZA_ANDROID_IPC_FETCH_BRIDGE__ = true;
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="__APP_THEME_COLOR__" />
  <meta name="color-scheme" content="dark light" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' electrobun://* https://*__APP_CSP_LOCAL_HTTP__;

               style-src 'self' 'unsafe-inline' https://*__APP_CSP_LOCAL_HTTP__;
               connect-src 'self' blob: data: eliza-local-agent: https://* wss://*__APP_CSP_LOCAL_CONNECT__;
               img-src 'self' data: blob: https://*__APP_CSP_LOCAL_HTTP__;
               media-src 'self' blob: https://*__APP_CSP_LOCAL_HTTP__;
               frame-src 'self' https://*__APP_CSP_LOCAL_HTTP__;
               worker-src 'self' blob:;
               font-src 'self' data: https://*__APP_CSP_LOCAL_HTTP__;" />
  <title>__APP_NAME__</title>
  <meta name="description" content="__APP_DESCRIPTION__" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="__APP_URL__" />

  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="__APP_URL__" />
  <meta property="twitter:title" content="__APP_NAME__" />

  <link rel="icon" type="image/svg+xml" href="/brand/favicons/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/brand/favicons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/brand/favicons/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/brand/favicons/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <script>
    // Synchronously apply the correct dark/light class to <html> before the
    // first paint so CSS custom properties (--bg, etc.) resolve immediately.
    // Mirrors the priority logic in packages/ui/src/state/persistence.ts:
    //   1. eliza:ui-theme-mode  ("dark" | "light" | "system")
    //   2. legacy eliza:ui-theme / elizaos:ui-theme
    //   3. system prefers-color-scheme
    (() => {
      try {
        let mode = localStorage.getItem('eliza:ui-theme-mode');
        if (!mode) {
          const legacy =
            localStorage.getItem('eliza:ui-theme') ||
            localStorage.getItem('elizaos:ui-theme');
          mode = (legacy === 'light' || legacy === 'dark') ? legacy : 'system';
        }
        const dark =
          mode === 'dark' ||
          (mode !== 'light' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        const root = document.documentElement;
        root.classList.toggle('dark', dark);
        root.style.colorScheme = dark ? 'dark' : 'light';
        root.setAttribute('data-theme', dark ? 'dark' : 'light');
      } catch {}
    })();
  </script>
  <style>
    /* FOUC guard — runs before external CSS so we use concrete values.
       The launch surface is black (#000000 — DEFAULT_BACKGROUND_COLOR, the
       base field of the home ShaderBackground; the orange ember glow renders
       on top of it). Keep it separate from --bg: --bg
       resolves to the light/dark theme background and can flash white/black
       before the loader appears. This surface PERSISTS as the page background
       under the app: any strip the fixed background layers don't reach (the
       iOS home-indicator safe-area under the composer, overscroll zones)
       shows this color, so it must EQUAL the default home background — that
       equality (enforced by test/brand-surface.test.ts) is what makes any
       bleed-through invisible. */
    :root {
      --launch-bg: #000000;
    }

    html,
    body,
    #root {
      background-color: var(--launch-bg, #000000);
    }

    html, body {
      margin: 0;
      padding: 0;
      color: #ffffff;
      font-family: var(--font-sans, "Poppins", Arial, system-ui, sans-serif);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Safe area insets for notched devices. NB: no bottom inset — the
       full-screen app background (ShaderBackground, fixed inset-0) must reach
       the true screen bottom so the home-indicator zone shows the same field as
       the rest of the screen (not the more-saturated body fallback color as a
       bright band). Components that sit at the bottom (the chat composer) clear
       the home indicator with their own env(safe-area-inset-bottom) padding. */
    body {
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    #root {
      min-height: 100dvh;
      background-color: var(--launch-bg, #000000);
    }

    .eliza-preboot-shell {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: var(--launch-bg, #000000);
      color: #ffffff;
    }

    .eliza-preboot-shell__dots {
      display: inline-flex;
      gap: 0.375rem;
      align-items: center;
      justify-content: center;
    }

    .eliza-preboot-shell__dots span {
      width: 0.375rem;
      height: 0.375rem;
      border-radius: 9999px;
      background: currentColor;
      opacity: 0.35;
      animation: eliza-preboot-pulse 0.9s ease-in-out infinite alternate;
    }

    .eliza-preboot-shell__dots span:nth-child(2) {
      animation-delay: 0.12s;
    }

    .eliza-preboot-shell__dots span:nth-child(3) {
      animation-delay: 0.24s;
    }

    @keyframes eliza-preboot-pulse {
      from {
        opacity: 0.28;
        transform: translateY(0);
      }
      to {
        opacity: 0.8;
        transform: translateY(-2px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .eliza-preboot-shell__dots span {
        animation: none;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="eliza-preboot-shell" role="status" aria-live="polite" aria-label="Loading Eliza">
      <div class="eliza-preboot-shell__dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
  <!-- Node polyfills — inline sync script ensures they're available before any ESM module evaluates -->
  <script>
    if (typeof globalThis.process === "undefined") {
      globalThis.process = {
        env: { NODE_ENV: "development" },
        cwd: () => "/",
        platform: "browser",
        version: "v0.0.0",
        versions: {},
        nextTick: (cb) => { Promise.resolve().then(cb); },
        stdout: { write: () => {} },
        stderr: { write: () => {} },
        argv: [],
        pid: 0,
        exit: () => {},
        on: function() { return this; },
        off: function() { return this; },
        emit: () => {},
        browser: true,
      };
    }
    if (typeof globalThis.Buffer === "undefined") {
      globalThis.Buffer = {
        alloc: (n) => new Uint8Array(n),
        from: (a, enc) => {
          if (typeof a === "string") {
            if (enc === "base64") {
              const b = atob(a);
              const u = new Uint8Array(b.length);
              for (let i = 0; i < b.length; i++) u[i] = b.charCodeAt(i);
              return u;
            }
            return new TextEncoder().encode(a);
          }
          return new Uint8Array(a);
        },
        isBuffer: () => false,
        concat: (bufs) => {
          const total = bufs.reduce((s, b) => s + b.length, 0);
          const result = new Uint8Array(total);
          let offset = 0;
          bufs.forEach((b) => { result.set(b, offset); offset += b.length; });
          return result;
        },
        byteLength: (s) => new TextEncoder().encode(s).length,
      };
    }
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
