[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "elizaos-webshop"
version = "2.0.0"
description = "WebShop benchmark for ElizaOS - web interaction shopping evaluation"
readme = "RESEARCH.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "elizaOS Contributors" }]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]

dependencies = [
  "eliza-adapter",
  # Upstream Princeton-NLP WebShop requirements (subset; pins relaxed from
  # upstream's exact pins so we can coexist with modern Python).
  "beautifulsoup4>=4.11.0",
  "cleantext>=1.1.4",
  "Flask>=2.1.0",
  "gym>=0.21",
  "numpy>=1.22",
  "pandas>=1.4",
  "rank_bm25>=0.2.2",         # BM25 fallback when pyserini is unavailable
  "rich>=12.0",
  "scikit-learn>=1.7.2",
  "spacy>=3.3",               # required by engine.goal.get_type_reward
  "thefuzz>=0.19.0",
  "torch>=2.13.0",
  "tqdm>=4.67.3",
  "transformers>=5.8.1",
  "PyYAML>=6.0",
  "requests>=2.34.2",
]

[tool.uv.sources]
eliza-adapter = { path = "../eliza-adapter", editable = true }

[project.optional-dependencies]
dev = [
  "pytest>=7.0.0",
  "pytest-asyncio>=0.23.0",
  "pytest-cov>=4.0.0",
]
# Full upstream search engine (requires Java 11+). Optional.
pyserini = [
  "pyserini>=0.17.0",
]
# Data fetching helper (Google Drive).
fetch = [
  "gdown>=4.0",
]
# Optional: load tasks from HuggingFace datasets
hf = [
  "datasets>=2.0.0",
]

[project.scripts]
webshop-bench = "elizaos_webshop.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["elizaos_webshop*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
