# (atomic overdraw bound + exactly-once settle + age-ordered sweep); "" = KV
# backstop (current). Off until soaked; cutover is an ops flip (#9899).
INFERENCE_BILLING_LEDGER = ""
# Tier-3 deferred admission (#9899): "true" moves the durable admission WRITE
# (ledger insert / KV pending charge) off the pre-forward critical path via
# executionCtx.waitUntil; the critical path keeps a cached 402 gate (15s
# org-balance hint + in-isolate refusal blocklist). Requires
# INFERENCE_OPTIMISTIC_BILLING. Off until soaked; cutover is an ops flip.
INFERENCE_DEFERRED_ADMISSION = "true"
# Tier-3 in-isolate decision caches (#9899): org rate-limit lease (convergent;
# leased requests are carried back into the Redis window), 60s shouldBlockUser
# memo, 60s model-catalog memo. Default off; rollback = flip off.
INFERENCE_HOT_PATH_CACHES = "true"
# Pass-through streaming fast path (#15428): "true" pipes qualifying streamed
# chat completions (OpenAI-compatible direct upstream, no tools/response_format/
# web-search) byte-for-byte from the provider instead of decoding/re-encoding
# through the AI SDK; usage is metered from a teed branch and billed through
# the existing settle chain. Default off; rollback = flip off.
INFERENCE_PASSTHROUGH_STREAMING = "true"

# Sibling flag for the non-streaming embeddings pipe (#15512): "true" forwards
# qualifying embeddings requests (direct-OpenAI source) verbatim and returns
# the upstream JSON untouched; usage parses from the same buffer and bills
# through the identical settle chain. Default off; rollback = flip off.
INFERENCE_PASSTHROUGH_EMBEDDINGS = "true"
FORCE_REDIS_EVENTS = "false"
