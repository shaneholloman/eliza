# Cloudflare Workers does NOT inherit top-level r2_buckets into environment
# blocks — they must be re-declared per-env. Same physical resources.
[[env.staging.r2_buckets]]
binding = "BLOB"
bucket_name = "eliza-cloud-blob-staging"

# Hyperdrive proxies the Worker's Postgres connection to Railway (workerd can't
# reliably open a direct node-pg TCP/TLS connection to an external Postgres).
[[env.staging.hyperdrive]]
binding = "HYPERDRIVE"
id = "ef65eb94c74144a3a3848ad1945571fb"

# KV is the Worker's cache backend (CacheClient). Workers can't reliably open raw
# TCP to an external Redis (Railway's public proxy hangs under load), so the Worker
# caches auth/api-key/model-catalog in KV instead of Redis.
[[env.staging.kv_namespaces]]
binding = "CACHE_KV"
id = "f7e24faaff734e7c8cd8e12b093c3571"

