# -----------------------------------------------------------------------------
# Required secrets — set via `wrangler secret put KEY` (or run
# packages/scripts/cf-secrets-migrate.mjs which iterates a .env file).
#
# CANONICAL LIST (cross-reference cloud/packages/apps/api/MIGRATION_NOTES.md once Agent B
# publishes it; if names diverge, Agent B's c.env.X usage wins — update this
# file and leave a note in cloud/INFRA.md).
#
#   DATABASE_URL                       Railway Postgres (Worker reaches it via the HYPERDRIVE binding;
#       DATABASE_URL is the origin string for the sidecar/scripts — public-proxy DSNs need
#       ?sslmode=no-verify or DATABASE_SSL_NO_VERIFY=true for direct node-pg consumers)
#   REDIS_URL                          Railway TCP Redis (primary cache/queue/rate-limit; rediss://...)
#   STEWARD_API_URL                    Optional Steward base URL override;
#       defaults to NEXT_PUBLIC_STEWARD_API_URL or NEXT_PUBLIC_API_URL + /steward
#   STEWARD_SESSION_SECRET             HS256 secret for Steward JWT verify (jose); MUST match Steward host
#   STEWARD_MASTER_PASSWORD            Steward vault encryption master password; required for wallet/key ops
#   STEWARD_TENANT_ID                  Default tenant scope; verifier rejects other tenants
#   STEWARD_DEFAULT_TENANT_ID          Embedded Steward default tenant id (optional; defaults to elizacloud)
#   STEWARD_DEFAULT_TENANT_KEY         Embedded Steward default tenant API key hash/source
#   STEWARD_PLATFORM_KEYS              Server-only platform key (server-wallets, tenant ops)
#   STEWARD_TENANT_API_KEY             Server-only tenant API key
#   STEWARD_REQUEST_SIGNING_SECRET     HMAC secret for signed Steward mutating requests
#   STEWARD_REQUEST_SIGNING_SECRETS    Comma-separated Steward HMAC secrets; first is used for signing
#   STEWARD_REQUEST_SIGNING_KEY_ID     Optional Steward tenant signing-key id
#   STRIPE_SECRET_KEY                  Stripe billing
#   STRIPE_WEBHOOK_SECRET              Stripe webhook signing (main billing endpoint)
#   STRIPE_CONNECT_WEBHOOK_SECRET      Stripe Connect endpoint webhook signing (payouts; distinct secret — the Connect payout webhook fail-closes without it)
#   STRIPE_SMALL_PACK_PRICE_ID         (and MEDIUM/LARGE *_PRICE_ID/_PRODUCT_ID)
#   OXAPAY_MERCHANT_API_KEY            OxaPay crypto checkout + webhook verification
#   OXAPAY_WEBHOOK_IPS                 Optional OxaPay webhook source IP allowlist
#   OXAPAY_PAYMENT_REQUESTS_CALLBACK_URL Payment-request settlement callback override
#   KV_REST_API_URL                    Upstash Redis REST (LEGACY fallback only; primary is REDIS_URL)
#   KV_REST_API_TOKEN                  Upstash auth (legacy fallback)
#   KV_REST_API_READ_ONLY_TOKEN        Upstash read-only token (legacy fallback)
#   OPENROUTER_API_KEY                 OpenRouter BYOK key (backup for non-native models)
#   ANTHROPIC_API_KEY                  Claude
#   OPENAI_API_KEY                     OpenAI direct
#   AI_GATEWAY_API_KEY
#   GROQ_API_KEY                       Groq
#   CEREBRAS_API_KEY                   Cerebras — ultra-fast inference for provisioning chat agent
#   FAL_KEY                            Fal.ai video gen
#   FAL_API_KEY                        Alias for FAL_KEY used by image/video/music generation
#   ATLASCLOUD_API_KEY                 AtlasCloud image generation billing key
#   ATLASCLOUD_BASE_URL                Optional AtlasCloud API base URL override
#   BIRDEYE_API_KEY                    Birdeye defi/price proxy key
#   ELEVENLABS_API_KEY                 ElevenLabs TTS
#   HF_TOKEN                           HuggingFace token for the /api/v1/hf-proxy/* route
#       (gated eliza-1 bundle downloads; clients never hold an HF key)
#   VAST_API_KEY                       Vast.ai Serverless endpoint API token (Bearer)
#   VAST_BASE_URL                      Vast.ai Serverless endpoint URL (e.g.
#       https://run.vast.ai/route/abc123). Provider strips trailing slash and
#       appends /v1/chat/completions. Set both VAST_* secrets together — both
#       are required to enable the vast/* model family.
#   SENDGRID_API_KEY                   (or RESEND_API_KEY) — outbound mail
#   AWS_KMS_KEY_ID / AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY  KMS-only;
#       used by packages/lib/services/secrets/encryption.ts when AWS_KMS_KEY_ID
