namespace_id = "1615312"
simple = { limit = 200, period = 60 }

[env.production]
name = "eliza-cloud-api-prod"
# Smart Placement (#15513, prod leg): staging soak showed mode=smart applied
# cleanly but staging traffic is too thin for Cloudflare's placement analyzer
# to ever qualify it — prod volume is what it learns from. Fail-safe by
# design: CF only moves execution when its analysis concludes it improves
# performance (back-end-heavy requests to api.cerebras.ai / api.openai.com /
# Hyperdrive); otherwise requests keep default placement. Rollback = delete
# this line + redeploy.
placement = { mode = "smart" }
workers_dev = false
# The `*.elizacloud.ai/*` wildcard makes this Worker the default origin for
# EVERY elizacloud.ai subdomain. Surfaces served by a different origin (e.g. the
# Feed app on Railway at feed.elizacloud.ai) MUST be carved out of this wildcard
# or they hit cloud-api instead of their real backend. The carve-out is a
# Cloudflare dashboard action (a Worker cannot opt a host out of its own route):
# add a more-specific Workers route `feed.elizacloud.ai/*` with Worker = None,
# or set the `feed` DNS record to DNS-only. ALTERNATIVELY (CI-deployable, no DNS
# change): set the `FEED_ORIGIN_HOST` var/secret to the Railway feed host and this
# Worker reverse-proxies feed.elizacloud.ai → Railway (src/index.ts, inert when
# unset). See packages/feed/RAILWAY.md, "Canonical host: feed.elizacloud.ai".
routes = [
  { pattern = "api.elizacloud.ai/*", zone_name = "elizacloud.ai" },
  { pattern = "x402.elizacloud.ai/*", zone_name = "elizacloud.ai" },
  { pattern = "*.elizacloud.ai/*", zone_name = "elizacloud.ai" },
]

[env.production.define]
__dirname = '"/"'
__filename = '"/worker.js"'

[env.production.vars]
NODE_ENV = "production"
# Apps deploy (Product 2): arms the Worker-side deploy trigger (configureAppsDeployTrigger,
# bootstrap-app.ts) so POST /api/v1/apps/:id/deploy enqueues a real APP_DEPLOY job instead of
# the no-op stub. Mirrors [env.staging.vars]. CUTOVER GATE — only effective once the prod
# daemon is armed (arm-apps-daemon.yml -f environment=production, sets APPS_DEPLOY_ENABLED via
# #8422) AND the prod apps data plane exists (terraform). Do NOT merge develop→main until
# staging QA is green and the prod data plane is applied. Production deploys are ALSO refined by
# the route-level org allowlist (apps-deploy-gate.ts): without APPS_DEPLOY_ALLOWED_ORG_IDS the
# deploy POST fails closed with 403 even when this flag is "1".
APPS_DEPLOY_ENABLED = "1"
# Org allowlist for apps-deploy (apps-deploy-gate.ts). "*" = open to ALL orgs —
# the launch posture so any user can deploy an app. Set here as a COMMITTED var,
# NOT a Cloudflare secret: secrets get wiped on Worker redeploys, which already
# silently re-closed apps-deploy in prod once. Requires the "*" wildcard support
# in apps-deploy-gate.ts (#9735). To pilot a narrower cohort instead, replace "*"
# with comma/space-separated org UUIDs.
APPS_DEPLOY_ALLOWED_ORG_IDS = "*"
NEXT_PUBLIC_APP_URL = "https://elizacloud.ai"
NEXT_PUBLIC_API_URL = "https://api.elizacloud.ai"
