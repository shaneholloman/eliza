<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>eDad — the dad you never had</title>
<meta name="description" content="eDad — the dad you never had. Warm, plain-spoken AI chat, powered by Eliza Cloud." />
<meta name="theme-color" content="#0b0b0d" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="icon" href="favicon.png" sizes="64x64" type="image/png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<!-- social card -->
<meta property="og:type" content="website" />
<meta property="og:title" content="eDad — the dad you never had" />
<meta property="og:description" content="Warm, plain-spoken AI chat that gives advice, roasts you a little, and is proud of you. Powered by Eliza Cloud." />
<meta property="og:image" content="og-image.png" />

<meta name="twitter:title" content="eDad — the dad you never had" />

</head>
<body>

<div class="app">

  <aside class="dad">
    <img class="portrait" src="dad-portrait.svg" alt="eDad, a warm illustrated dad" width="180" height="234" />
    <h1 class="brand">eDad</h1>
    <p class="tagline">the dad you never had</p>
    <ul class="traits">
      <li>gives advice</li>
      <li>roasts you a little</li>
      <li>proud of you (probably)</li>
    </ul>
    <p class="footer-note">powered by <a href="https://www.elizacloud.ai" target="_blank" rel="noopener">eliza cloud</a></p>
  </aside>

  <main class="chat">
    <header class="topbar">
      <div class="status">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">ready</span>
      </div>
      <div class="auth-actions">
        <button id="login-btn" class="login-btn" type="button">sign in with eliza cloud</button>
        <button id="logout-btn" class="login-btn ghost-btn" type="button" hidden>sign out</button>
      </div>
    </header>

    <div class="notice" id="notice" hidden></div>

    <section class="messages" id="messages" aria-live="polite">
      <div class="msg dad-msg">
        <div class="avatar"><img src="dad-avatar.svg" alt="eDad" width="34" height="34" /></div>
        <div class="bubble">
          <p>well look who finally came around, champ. pull up a chair. what's on your mind?</p>
        </div>
      </div>
    </section>

    <form class="composer" id="composer">
      <textarea id="input" placeholder="tell dad what's up..." rows="2" maxlength="4000"></textarea>
      <button type="submit" id="send-btn">send</button>
    </form>

  </main>

</div>

<script>
const TOKEN_KEY = "edad.oauthToken";
const STATE_KEY = "edad.oauthState";
const API_BASE = "api"; // relative → /apps/edad/api/*
const MODEL = "anthropic/claude-sonnet-4.6";

const SYSTEM_PROMPT = `You are eDad, the dad the user never had. You are warm, supportive, and deeply human, but you also rib them a little the way a real dad would. You speak plainly, never corporate, never therapist-ese.

Tone rules:
- call them "champ", "kiddo", "sport", "tiger", or "buddy" — rotate naturally, don't overdo it
- give real, concrete advice. not vibes, not affirmations. if they're being dumb, gently say so
- roast them a little when it fits — never mean, always with love, like a dad razzing his kid at a bbq
- tell them you're proud of them when they've earned it (or when they clearly need to hear it)
- share little "back in my day" style asides occasionally. brief, not lectures
- use dad-isms: "that's a hell of a thing", "listen here", "don't sweat it", "attaboy/attagirl", "look, it's simple"
- never use em-dashes. use periods, commas, or parentheses instead
- never use emoji
- keep it conversational. 2-4 short paragraphs max unless they ask for a deep dive
- if they're hurting, acknowledge it first, then gently redirect to what they can actually do
- if they ask for advice on something dangerous/illegal, be a dad: tell them that's a bad idea and why, but don't get preachy

You are not a therapist and you're not a life coach. You're the dad who believed in them, now over text.`;

const GREETING_TEXT = "well look who finally came around, champ. pull up a chair. what's on your mind?";

const els = {
  messages: document.getElementById("messages"),
  composer: document.getElementById("composer"),
  input: document.getElementById("input"),
  sendBtn: document.getElementById("send-btn"),
  loginBtn: document.getElementById("login-btn"),
  logoutBtn: document.getElementById("logout-btn"),
  notice: document.getElementById("notice"),
  statusDot: document.getElementById("status-dot"),
  statusText: document.getElementById("status-text"),
};

const history = [];
let inflight = false;
let cfg = null; // { app_id, cloud_url, affiliate_code }

function ls(k) { try { return localStorage.getItem(k) || ""; } catch { return ""; } }
function lsSet(k, v) { try { if (v) localStorage.setItem(k, v); else localStorage.removeItem(k); } catch {} }
function ss(k) { try { return sessionStorage.getItem(k) || ""; } catch { return ""; } }
function ssSet(k, v) { try { if (v) sessionStorage.setItem(k, v); else sessionStorage.removeItem(k); } catch {} }

function getToken() { return ls(TOKEN_KEY); }
function isSignedIn() { return !!getToken(); }

function setStatus(state, text) {
  els.statusDot.className = "dot " + state;
  els.statusText.textContent = text;
}

function setNotice(msg, kind) {
  if (!msg) { els.notice.hidden = true; els.notice.textContent = ""; return; }
  els.notice.hidden = false;
  els.notice.className = "notice" + (kind ? " " + kind : "");
  els.notice.textContent = msg;
}

function refreshAuthUI() {
  const signedIn = isSignedIn();
  els.loginBtn.hidden = signedIn;
  els.logoutBtn.hidden = !signedIn;
  els.loginBtn.disabled = !cfg || !cfg.app_id;
  if (signedIn) {
    els.logoutBtn.textContent = "sign out";
    setNotice("");
    loadHistory();
  } else if (cfg && !cfg.app_id) {
    setNotice("eDad isn't registered with eliza cloud yet. Tell the owner to set ELIZA_APP_ID.", "warn");
  }
}

let historyLoaded = false;
// Hydrate the chat with this user's persisted history once per sign-in. No-op
// when the app has no DB (server returns an empty list) or already loaded.
async function loadHistory() {
  if (historyLoaded || !isSignedIn()) return;
  historyLoaded = true;
  try {
    const res = await fetch(API_BASE + "/history/", {
      headers: { "x-app-session": getToken() },
    });
    if (!res.ok) return;
    const data = await res.json().catch(() => null);
    const messages = data && Array.isArray(data.messages) ? data.messages : [];
    for (const m of messages) {
      if (!m || (m.role !== "user" && m.role !== "assistant")) continue;
      const text = typeof m.content === "string" ? m.content : "";
      if (!text) continue;
      history.push({ role: m.role, content: text });
      addMessage(m.role, text);
    }
  } catch {
    // history is a nicety — never block the chat on a failed load.
    historyLoaded = false;
  }
}

function scrollToBottom() {
  requestAnimationFrame(() => { els.messages.scrollTop = els.messages.scrollHeight; });
}

function addMessage(role, text) {
  const wrap = document.createElement("div");
  wrap.className = "msg " + (role === "user" ? "user-msg" : "dad-msg");
  const avatar = document.createElement("div");
  avatar.className = "avatar";
  const avatarImg = document.createElement("img");
  avatarImg.src = role === "user" ? "you-avatar.svg" : "dad-avatar.svg";
  avatarImg.alt = role === "user" ? "you" : "eDad";
  avatarImg.width = 34;
  avatarImg.height = 34;
  avatar.appendChild(avatarImg);
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  const p = document.createElement("p");
  p.textContent = text;
  bubble.appendChild(p);
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  els.messages.appendChild(wrap);
  scrollToBottom();
  return p;
}

function resetConversation() {
  history.length = 0;
  els.messages.innerHTML = "";
  addMessage("assistant", GREETING_TEXT);
}

function randomState() {
  const bytes = new Uint8Array(16);
  crypto.getRandomValues(bytes);
  return Array.from(bytes, b => b.toString(16).padStart(2, "0")).join("");
}

async function loadConfig() {
  try {
    const res = await fetch(API_BASE + "/config/");
    if (!res.ok) throw new Error("config fetch failed");
    cfg = await res.json();
  } catch {
    cfg = { app_id: null, cloud_url: "https://www.elizacloud.ai", affiliate_code: "" };
  }
}

async function handleOAuthCallback() {
  const params = new URLSearchParams(location.search);
  // Eliza Cloud redirects back with a SINGLE-USE authorization code (`code`),
  // not a durable token. We redeem it once, server-side, for an app session.
  const code = params.get("code");
  const state = params.get("state");
  const err = params.get("error");

  if (err) {
    setNotice("sign-in cancelled or failed: " + (params.get("error_description") || err), "error");
    cleanUrl();
    return;
  }

  if (!code) return;

  const expected = ss(STATE_KEY);
  ssSet(STATE_KEY, "");
  // Strip the code from the URL immediately — it is single-use, so a reload
  // must not try to redeem it again.
  cleanUrl();
  if (!expected || state !== expected) {
    setNotice("sign-in failed: state mismatch. try again, champ.", "error");
    return;
  }

  try {
    const res = await fetch(API_BASE + "/auth/exchange", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ code }),
    });
    const data = await res.json().catch(() => null);
    if (!res.ok || !data || !data.session) {
      setNotice("sign-in didn't finish: " + ((data && data.error && data.error.message) || "try again"), "error");
      return;
    }
    lsSet(TOKEN_KEY, data.session);
    historyLoaded = false;
    resetConversation();
    setNotice("signed in with eliza cloud. chat away.", "ok");
    setTimeout(() => setNotice(""), 3500);
    refreshAuthUI();
  } catch {
    setNotice("sign-in didn't finish — couldn't reach the server. try again.", "error");
  }
}

function cleanUrl() {
  const url = new URL(location.href);
  // `code` is the single-use OAuth param Cloud redirects with — strip it so a
  // reload can't try to redeem a spent code (and re-trigger a state error).
  url.searchParams.delete("code");
  url.searchParams.delete("state");
  url.searchParams.delete("error");
  url.searchParams.delete("error_description");
  window.history.replaceState({}, "", url.pathname + (url.search || "") + url.hash);
}

function startLogin() {
  if (!cfg || !cfg.app_id) {
    setNotice("eDad isn't registered with eliza cloud yet.", "warn");
    return;
  }
  const state = randomState();
  ssSet(STATE_KEY, state);
  const redirect = new URL(location.href);
  redirect.search = "";
  redirect.hash = "";
  const authorize = new URL("/app-auth/authorize", cfg.cloud_url);
  authorize.searchParams.set("app_id", cfg.app_id);
  authorize.searchParams.set("redirect_uri", redirect.toString());
  authorize.searchParams.set("state", state);
  location.href = authorize.toString();
}

function logout() {
  lsSet(TOKEN_KEY, "");
  historyLoaded = false;
  resetConversation();
  refreshAuthUI();
  setNotice("signed out.", "ok");
  setTimeout(() => setNotice(""), 2000);
}

async function send(text) {
  if (inflight) return;
  if (!text.trim()) return;
  inflight = true;
  els.sendBtn.disabled = true;
  setStatus("thinking", "dad's thinking...");

  history.push({ role: "user", content: text });
  addMessage("user", text);
  els.input.value = "";

  const placeholder = addMessage("assistant", "…");

  try {
    const headers = { "content-type": "application/json" };
    const token = getToken();
    if (token) headers["x-app-session"] = token;

    const res = await fetch(API_BASE + "/messages/", {
      method: "POST",
      headers,
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: history.map(m => ({ role: m.role, content: [{ type: "text", text: m.content }] })),
      }),
    });

    if (!res.ok) {
      const t = await res.text();
      let msg = "dad's got a crick in his neck. try again in a minute, champ.";
      try {
        const j = JSON.parse(t);
        if (j && (j.error || j.message)) msg = `dad says: ${j.error?.message || j.error || j.message}`;
      } catch {}
      if (res.status === 401) {
        msg = "dad needs you to sign in with eliza cloud. click the button up top, kiddo.";
        // token might be expired — nuke it
        if (getToken()) { lsSet(TOKEN_KEY, ""); resetConversation(); refreshAuthUI(); }
      }
      if (res.status === 402) msg = "dad's wallet is empty. top up at elizacloud.ai, champ.";
      placeholder.textContent = msg;
      history.pop();
      setStatus("error", "error");
      return;
    }

    const data = await res.json();
    const out = (data.content || [])
      .filter(b => b.type === "text")
      .map(b => b.text)
      .join("\n")
      .trim() || "...";
    placeholder.textContent = out;
    history.push({ role: "assistant", content: out });
    setStatus("ok", "ready");
  } catch {
    placeholder.textContent = "dad lost the signal on the old rabbit ears. try again.";
    history.pop();
    setStatus("error", "offline");
  } finally {
    inflight = false;
    els.sendBtn.disabled = false;
    scrollToBottom();
  }
}

els.composer.addEventListener("submit", (e) => {
  e.preventDefault();
  send(els.input.value);
});

els.input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send(els.input.value);
  }
});

els.loginBtn.addEventListener("click", startLogin);
els.logoutBtn.addEventListener("click", logout);

(async () => {
  handleOAuthCallback();
  await loadConfig();
  refreshAuthUI();
  setStatus("ok", "ready");
})();
</script>

</body>
</html>
